<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" role="img" aria-labelledby="title desc">
  <title id="title">定滑車と動滑車からなる系</title>
  <desc id="desc">天井に固定された定滑車に糸Aを通し、左端に物体1、右端に動滑車を吊るす。動滑車に糸Bを通し、その左右の端に物体2と物体3を吊るす。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#111"/>
    </marker>
  </defs>

  <rect width="720" height="560" fill="#fff"/>

  <!-- 天井と定滑車 -->
  <path d="M105 45H475M120 45l18-18m21 18 18-18m21 18 18-18m21 18 18-18m21 18 18-18m21 18 18-18m21 18 18-18m21 18 18-18m21 18 18-18" fill="none" stroke="#111" stroke-width="3"/>
  <line x1="300" y1="45" x2="300" y2="76" stroke="#111" stroke-width="3"/>
  <circle cx="300" cy="126" r="50" fill="#fff" stroke="#111" stroke-width="3"/>
  <circle cx="300" cy="126" r="5" fill="#111"/>

  <!-- 糸A：左端に物体1、右端に動滑車の軸 -->
  <path d="M250 126V266M250 126A50 50 0 0 1 350 126M350 126V285" fill="none" stroke="#111" stroke-width="3"/>
  <text x="375" y="112" font-family="sans-serif" font-size="22" fill="#111">糸A</text>

  <rect x="211" y="266" width="78" height="64" fill="#fff" stroke="#111" stroke-width="3"/>

  <!-- 動滑車。中心が糸Aの右端の真下にある -->
  <circle cx="350" cy="335" r="50" fill="#fff" stroke="#111" stroke-width="3"/>
  <circle cx="350" cy="335" r="5" fill="#111"/>
  <line x1="350" y1="285" x2="350" y2="335" stroke="#111" stroke-width="3"/>

  <!-- 糸B：動滑車の上側を通り、両端は物体2・3へ下がる -->
  <path d="M300 335V444M300 335A50 50 0 0 1 400 335M400 335V416" fill="none" stroke="#111" stroke-width="3"/>
  <text x="420" y="361" font-family="sans-serif" font-size="22" fill="#111">糸B</text>

  <rect x="261" y="444" width="78" height="64" fill="#fff" stroke="#111" stroke-width="3"/>
  <rect x="361" y="416" width="78" height="64" fill="#fff" stroke="#111" stroke-width="3"/>

  <!-- 定滑車の中心Oを原点とする鉛直下向きの正方向 -->
  <line x1="300" y1="142" x2="300" y2="226" stroke="#111" stroke-width="2.5" stroke-dasharray="7 6" marker-end="url(#arrow)"/>
</svg>
