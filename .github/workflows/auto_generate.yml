name: Auto Generate Physics Problem

on:
  schedule:
    # 毎日 日本時間 04:00〜06:55 の間、5分に1回実行
    # UTCでは前日の19:00〜21:55
    - cron: '*/5 19-21 * * *'
  workflow_dispatch:


jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install google-genai pyyaml mkdocs-material mkdocs-awesome-pages-plugin

      - name: Generate new problem
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate.py

      - name: Commit and Push new problem
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --quiet && git diff --staged --quiet || (git commit -m "自動生成: 新しい物理の問題を追加" && git pull --rebase origin main && git push)

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy 