thermodynamics:
  # ==========================================
  # 第1章：熱力学の基本概念と状態方程式
  # ==========================================
  - theme: "状態量・状態方程式・準静的過程"
    problems:
      - id: "01_010"
        title: "状態量と経路依存量"
        difficulty: "基本"
        setup: '温度・圧力・体積・内部エネルギーなどの状態量と、熱や仕事のような経路依存量の違いを説明し、熱力学過程における物理量の分類を理解する問題'

      - id: "01_020"
        title: "理想気体の状態方程式"
        difficulty: "基本"
        setup: '理想気体の状態方程式 $PV=nRT$ を用いて、圧力・体積・温度・物質量の関係を計算し、状態変化に伴う各物理量の変化を求める問題'

      - id: "01_030"
        title: "準静的過程と可逆過程"
        difficulty: "基本"
        setup: '準静的過程と可逆過程の意味を区別し、$P$-$V$ 図上で表される熱力学過程において、気体がする仕事を面積として解釈する問題'

      - id: "01_040"
        title: "理想気体の等温過程"
        difficulty: "標準"
        setup: '理想気体が温度一定で準静的に膨張または圧縮される過程について、気体がする仕事、吸収する熱量、内部エネルギー変化を求める問題'

      - id: "01_050"
        title: "理想気体の定積過程と定圧過程"
        difficulty: "標準"
        setup: '理想気体の定積過程および定圧過程について、熱力学第一法則を用いて熱量・仕事・内部エネルギー変化の関係を整理し、定積比熱と定圧比熱を用いて計算する問題'

      - id: "01_060"
        title: "理想気体の断熱過程"
        difficulty: "標準"
        setup: '理想気体が準静的かつ断熱的に変化する場合について、$PV^\gamma=\mathrm{const.}$ を導出し、仕事・温度変化・圧力変化を求める問題'

      - id: "01_070"
        title: "ファンデルワールス気体の状態方程式"
        difficulty: "発展"
        setup: '分子間相互作用と分子の有限体積を考慮したファンデルワールス状態方程式を用いて、理想気体からのずれや臨界点の条件を解析する問題'

  # ==========================================
  # 第2章：熱力学第一法則
  # ==========================================
  - theme: "熱力学第一法則と内部エネルギー"
    problems:
      - id: "02_010"
        title: "熱力学第一法則の基本"
        difficulty: "基本"
        setup: '熱力学第一法則 $dU=\delta Q-\delta W$ の意味を理解し、符号規約に注意しながら、熱・仕事・内部エネルギー変化の関係を計算する問題'

      - id: "02_020"
        title: "理想気体の内部エネルギー"
        difficulty: "基本"
        setup: '理想気体の内部エネルギーが温度のみの関数であることを用いて、状態変化における内部エネルギー変化を比熱から求める問題'

      - id: "02_030"
        title: "気体のする仕事と $P$-$V$ 図"
        difficulty: "基本"
        setup: '準静的過程において気体がする仕事 $W=\int P\,dV$ を計算し、$P$-$V$ 図上の面積との対応を理解する問題'

      - id: "02_040"
        title: "比熱の関係式"
        difficulty: "標準"
        setup: '理想気体について定圧比熱 $C_P$ と定積比熱 $C_V$ の関係式 $C_P-C_V=nR$ を導出し、比熱比 $\gamma=C_P/C_V$ を用いた計算を行う問題'

      - id: "02_050"
        title: "多原子分子気体の比熱"
        difficulty: "標準"
        setup: '単原子分子・二原子分子・多原子分子気体について、自由度の違いを考慮しながら内部エネルギーや比熱を求める問題'

      - id: "02_060"
        title: "ジュールの自由膨張"
        difficulty: "標準"
        setup: '断熱容器内で理想気体が真空中へ自由膨張する過程について、仕事・熱・内部エネルギー変化を求め、温度変化が生じない理由を説明する問題'

      - id: "02_070"
        title: "ジュール・トムソン効果"
        difficulty: "発展"
        setup: '多孔質栓を通る断熱膨張過程においてエンタルピーが保存されることを用い、ジュール・トムソン係数の定義と冷却・加熱条件を解析する問題'

  # ==========================================
  # 第3章：熱機関とサイクル
  # ==========================================
  - theme: "熱機関・冷凍機・熱力学サイクル"
    problems:
      - id: "03_010"
        title: "熱機関の効率"
        difficulty: "基本"
        setup: '高温熱源から熱を受け取り、低温熱源へ熱を捨てながら仕事を取り出す熱機関について、吸収熱・放出熱・仕事の関係から熱効率を求める問題'

      - id: "03_020"
        title: "カルノーサイクル"
        difficulty: "基本"
        setup: '二つの等温過程と二つの断熱過程からなるカルノーサイクルについて、各過程での熱量と仕事を計算し、効率 $\eta=1-T_C/T_H$ を導出する問題'

      - id: "03_030"
        title: "オットーサイクル"
        difficulty: "標準"
        setup: '断熱圧縮・定積加熱・断熱膨張・定積冷却からなるオットーサイクルについて、圧縮比と比熱比を用いて熱効率を導出する問題'

      - id: "03_040"
        title: "ディーゼルサイクル"
        difficulty: "標準"
        setup: '断熱圧縮・定圧加熱・断熱膨張・定積冷却からなるディーゼルサイクルについて、各状態量の関係を整理し熱効率を求める問題'

      - id: "03_050"
        title: "スターリングサイクル"
        difficulty: "標準"
        setup: '等温過程と定積過程からなるスターリングサイクルについて、再生器がある場合とない場合で熱効率がどのように変わるかを解析する問題'

      - id: "03_060"
        title: "冷凍機とヒートポンプ"
        difficulty: "標準"
        setup: '冷凍機およびヒートポンプについて、仕事入力・吸収熱・放出熱の関係を整理し、成績係数をカルノーサイクルの場合と比較する問題'

      - id: "03_070"
        title: "不可逆熱機関の効率"
        difficulty: "発展"
        setup: '有限温度差で熱交換を行う不可逆熱機関を考え、カルノー効率よりも効率が低下する理由をエントロピー生成の観点から説明する問題'

  # ==========================================
  # 第4章：熱力学第二法則とエントロピー
  # ==========================================
  - theme: "第二法則・エントロピー・不可逆性"
    problems:
      - id: "04_010"
        title: "熱力学第二法則の表現"
        difficulty: "基本"
        setup: 'クラウジウスの原理とケルビン・プランクの原理を説明し、これらが熱機関や冷凍機の動作制限を表していることを理解する問題'

      - id: "04_020"
        title: "クラウジウスの不等式"
        difficulty: "標準"
        setup: '可逆サイクルと不可逆サイクルに対してクラウジウスの不等式 $\oint \delta Q/T \leq 0$ を導入し、エントロピーが状態量として定義できることを示す問題'

      - id: "04_030"
        title: "理想気体のエントロピー変化"
        difficulty: "標準"
        setup: '理想気体の状態変化について、可逆経路を用いてエントロピー変化を計算し、温度・体積・圧力の変化による表式を導出する問題'

      - id: "04_040"
        title: "熱伝導によるエントロピー生成"
        difficulty: "標準"
        setup: '異なる温度をもつ二つの物体を熱接触させたとき、全体のエントロピー変化を計算し、不可逆な熱移動によりエントロピーが増大することを示す問題'

      - id: "04_050"
        title: "自由膨張とエントロピー"
        difficulty: "標準"
        setup: '理想気体の自由膨張について、実際の過程は不可逆であるが、同じ始状態と終状態を結ぶ可逆等温過程を考えることでエントロピー変化を求める問題'

      - id: "04_060"
        title: "混合エントロピー"
        difficulty: "発展"
        setup: '二種類の理想気体を混合したときのエントロピー変化を計算し、同種粒子と異種粒子の違いやギブズのパラドックスに関連する考察を行う問題'

      - id: "04_070"
        title: "エントロピー最大原理"
        difficulty: "発展"
        setup: '孤立系の平衡状態がエントロピー最大条件によって決まることを用いて、二つの熱力学系が接触したときの熱平衡条件を導出する問題'

  # ==========================================
  # 第5章：熱力学ポテンシャル
  # ==========================================
  - theme: "熱力学ポテンシャルとマクスウェルの関係式"
    problems:
      - id: "05_010"
        title: "エンタルピー"
        difficulty: "基本"
        setup: 'エンタルピー $H=U+PV$ を導入し、定圧過程において吸収熱がエンタルピー変化に対応することを示す問題'

      - id: "05_020"
        title: "ヘルムホルツ自由エネルギー"
        difficulty: "標準"
        setup: 'ヘルムホルツ自由エネルギー $F=U-TS$ を導入し、温度と体積が一定の条件下で平衡状態が自由エネルギー最小条件によって決まることを理解する問題'

      - id: "05_030"
        title: "ギブズ自由エネルギー"
        difficulty: "標準"
        setup: 'ギブズ自由エネルギー $G=H-TS$ を導入し、温度と圧力が一定の条件下で自発変化の向きや相平衡条件を判定する問題'

      - id: "05_040"
        title: "熱力学ポテンシャルの自然変数"
        difficulty: "標準"
        setup: '内部エネルギー・エンタルピー・ヘルムホルツ自由エネルギー・ギブズ自由エネルギーの全微分を求め、それぞれの自然変数を整理する問題'

      - id: "05_050"
        title: "マクスウェルの関係式"
        difficulty: "標準"
        setup: '熱力学ポテンシャルの全微分と混合偏微分の交換可能性を用いて、マクスウェルの関係式を導出し、熱力学量の変換に利用する問題'

      - id: "05_060"
        title: "比熱・膨張率・圧縮率の関係"
        difficulty: "発展"
        setup: '定圧比熱と定積比熱の差、熱膨張率、等温圧縮率の間に成り立つ熱力学的関係式を、マクスウェルの関係式を用いて導出する問題'

      - id: "05_070"
        title: "ギブズ・デュエムの関係式"
        difficulty: "発展"
        setup: '多成分系において化学ポテンシャルを導入し、示量性とオイラーの関係を用いてギブズ・デュエムの関係式を導出する問題'

  # ==========================================
  # 第6章：相平衡と相転移
  # ==========================================
  - theme: "相平衡・相転移・クラペイロンの式"
    problems:
      - id: "06_010"
        title: "相平衡条件"
        difficulty: "基本"
        setup: '二つの相が平衡にある条件として、温度・圧力・化学ポテンシャルが等しいことを説明し、相図の読み取りに応用する問題'

      - id: "06_020"
        title: "一次相転移と潜熱"
        difficulty: "基本"
        setup: '融解・蒸発などの一次相転移において、温度が一定のまま潜熱が吸収または放出されることを、エントロピー変化と関連づけて理解する問題'

      - id: "06_030"
        title: "クラペイロンの式"
        difficulty: "標準"
        setup: '相平衡線上で二つの相のギブズ自由エネルギーが等しい条件から、クラペイロンの式 $dP/dT=\Delta S/\Delta V$ を導出する問題'

      - id: "06_040"
        title: "クラウジウス・クラペイロンの式"
        difficulty: "標準"
        setup: '液相と気相の相平衡に対して気体を理想気体近似し、蒸気圧の温度依存性を表すクラウジウス・クラペイロンの式を導出する問題'

      - id: "06_050"
        title: "ファンデルワールス気体の相転移"
        difficulty: "発展"
        setup: 'ファンデルワールス状態方程式に現れる不安定領域を考察し、マクスウェルの等面積則を用いて液体・気体の共存条件を決定する問題'

      - id: "06_060"
        title: "臨界点と臨界指数の基礎"
        difficulty: "発展"
        setup: 'ファンデルワールス気体の臨界点条件を用いて臨界温度・臨界圧力・臨界体積を求め、臨界点近傍での物理量の振る舞いを考察する問題'

      - id: "06_070"
        title: "二次相転移と秩序変数"
        difficulty: "発展"
        setup: '二次相転移において潜熱が存在しない一方で比熱や感受率が異常を示すことを、秩序変数と自由エネルギー展開の観点から理解する問題'

  # ==========================================
  # 第7章：熱力学的安定性と応答関数
  # ==========================================
  - theme: "安定性条件と応答関数"
    problems:
      - id: "07_010"
        title: "熱平衡と力学的平衡"
        difficulty: "基本"
        setup: '二つの系が熱的・力学的に接触している場合について、エントロピー最大条件から温度の等しさと圧力の等しさが平衡条件として得られることを示す問題'

      - id: "07_020"
        title: "熱容量の正値性"
        difficulty: "標準"
        setup: '熱力学的安定性の観点から熱容量が正であることの意味を考え、エネルギー揺らぎやエントロピーの凹性との関係を理解する問題'

      - id: "07_030"
        title: "等温圧縮率の正値性"
        difficulty: "標準"
        setup: '安定な平衡状態では等温圧縮率が正でなければならないことを、自由エネルギーの凸性や圧力体積関係から説明する問題'

      - id: "07_040"
        title: "自由エネルギーの凸性と凹性"
        difficulty: "発展"
        setup: 'エントロピーや自由エネルギーの凸性・凹性を用いて、熱力学的安定性条件を数学的に表現し、応答関数の符号との関係を導出する問題'

      - id: "07_050"
        title: "断熱圧縮率と音速"
        difficulty: "発展"
        setup: '流体中の微小な圧力変化が断熱的に伝わることを仮定し、断熱圧縮率と音速の関係を導出する問題'

      - id: "07_060"
        title: "熱膨張率と密度異常"
        difficulty: "発展"
        setup: '熱膨張率の定義を用いて、通常の物質における温度変化と体積変化の関係を解析し、水の密度異常のような例外的な振る舞いを熱力学的に考察する問題'

  # ==========================================
  # 第8章：開いた系と化学ポテンシャル
  # ==========================================
  - theme: "化学ポテンシャルと開いた系"
    problems:
      - id: "08_010"
        title: "化学ポテンシャルの定義"
        difficulty: "基本"
        setup: '粒子数が変化しうる系において化学ポテンシャル $\mu$ を導入し、内部エネルギーやギブズ自由エネルギーの微分形に粒子数変化の項が現れることを理解する問題'

      - id: "08_020"
        title: "粒子交換を許す二つの系の平衡"
        difficulty: "標準"
        setup: '二つの系が粒子を交換できる場合について、全エントロピー最大条件から化学ポテンシャルが等しいことが平衡条件として得られることを導出する問題'

      - id: "08_030"
        title: "理想気体の化学ポテンシャル"
        difficulty: "標準"
        setup: '理想気体のギブズ自由エネルギーや状態方程式を用いて、化学ポテンシャルの圧力依存性や温度依存性を求める問題'

      - id: "08_040"
        title: "半透膜と浸透圧"
        difficulty: "標準"
        setup: '溶媒のみを通す半透膜を介して希薄溶液と純溶媒が接している場合について、化学ポテンシャルの平衡条件から浸透圧の式を導出する問題'

      - id: "08_050"
        title: "化学反応の平衡条件"
        difficulty: "発展"
        setup: '化学反応を含む系において、反応進行度を導入し、ギブズ自由エネルギー最小条件から化学平衡条件を導出する問題'

      - id: "08_060"
        title: "グランドポテンシャル"
        difficulty: "発展"
        setup: '温度・体積・化学ポテンシャルが一定の条件で自然に現れるグランドポテンシャルを導入し、開いた系の平衡条件や熱力学的関係式を整理する問題'