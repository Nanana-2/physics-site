statistical_mechanics:
  # ==========================================
  # 第1章：確率・状態数・エントロピー
  # ==========================================
  - theme: "確率分布・状態数・ボルツマンエントロピー"
    problems:
      - id: "01_010"
        title: "離散確率分布の平均と分散"
        difficulty: "基本"
        setup: '離散的な確率分布が与えられたとき，物理量の期待値・分散・標準偏差を計算し，統計力学における平均操作の意味を理解する問題'

      - id: "01_020"
        title: "二項分布と大数の法則"
        difficulty: "基本"
        setup: '独立な二状態系が多数集まった場合について二項分布を用いて状態数を求め，粒子数が大きい極限で相対揺らぎが小さくなることを示す問題'

      - id: "01_030"
        title: "スターリングの公式"
        difficulty: "基本"
        setup: '大きな整数 $N$ に対してスターリングの公式 $\log N! \simeq N\log N-N$ を用い，多数粒子系の状態数やエントロピーを近似的に計算する問題'

      - id: "01_040"
        title: "ボルツマンエントロピー"
        difficulty: "標準"
        setup: '微視的状態数 $\Omega$ とエントロピーの関係式 $S=k_B\log\Omega$ を用いて，簡単な多体系のエントロピーを求め，状態数が最大となる平衡状態を考察する問題'

      - id: "01_050"
        title: "二準位系の状態数とエントロピー"
        difficulty: "標準"
        setup: 'エネルギー $0$ と $\epsilon$ の二準位をもつ独立な粒子が多数存在する系について，励起粒子数を指定した状態数を求め，エントロピーのエネルギー依存性を解析する問題'

      - id: "01_060"
        title: "エントロピー最大原理"
        difficulty: "標準"
        setup: '全エネルギーが一定の孤立系において，エントロピー最大条件から平衡分布が決まることを示し，熱力学における平衡条件との対応を理解する問題'

      - id: "01_070"
        title: "負温度をもつ二準位系"
        difficulty: "発展"
        setup: 'エネルギーに上限をもつ二準位系について，エントロピーのエネルギー依存性から温度を定義し，負温度が現れる条件とその物理的意味を考察する問題'

  # ==========================================
  # 第2章：ミクロカノニカル分布
  # ==========================================
  - theme: "ミクロカノニカル分布と孤立系"
    problems:
      - id: "02_010"
        title: "等重率の原理"
        difficulty: "基本"
        setup: 'エネルギー・体積・粒子数が一定の孤立系において，許された微視的状態が等確率で実現するという等重率の原理を用いて，物理量の平均値を計算する問題'

      - id: "02_020"
        title: "ミクロカノニカル分布のエントロピー"
        difficulty: "基本"
        setup: '孤立系のエネルギー幅内に含まれる微視的状態数を用いてエントロピーを定義し，温度や圧力などの熱力学量がエントロピーの偏微分から得られることを理解する問題'

      - id: "02_030"
        title: "二つの系の熱平衡条件"
        difficulty: "標準"
        setup: 'エネルギーを交換できる二つの孤立系を考え，全エントロピー最大条件から両者の温度が等しくなることを導出する問題'

      - id: "02_040"
        title: "理想気体の状態数"
        difficulty: "標準"
        setup: '古典的な単原子理想気体について，位相空間体積から微視的状態数を求め，ミクロカノニカル分布に基づいてエントロピーを導出する問題'

      - id: "02_050"
        title: "サッカー・テトロード方程式"
        difficulty: "発展"
        setup: '量子力学的な状態数の数え上げを考慮して単原子理想気体のエントロピーを求め，サッカー・テトロード方程式の形を導出する問題'

      - id: "02_060"
        title: "Gibbsのパラドックス"
        difficulty: "発展"
        setup: '同種粒子と異種粒子の混合エントロピーを比較し，古典的な粒子の区別可能性を仮定するとギブズのパラドックスが生じること，および粒子の不可区別性による解決を理解する問題'

      - id: "02_070"
        title: "ミクロカノニカル分布からカノニカル分布へ"
        difficulty: "発展"
        setup: '小さな系が大きな熱浴と接している状況をミクロカノニカル分布から出発して解析し，小さな系の確率分布がカノニカル分布になることを導出する問題'

  # ==========================================
  # 第3章：カノニカル分布
  # ==========================================
  - theme: "カノニカル分布と分配関数"
    problems:
      - id: "03_010"
        title: "ボルツマン因子"
        difficulty: "基本"
        setup: '温度 $T$ の熱浴と接する系において，エネルギー $E_i$ をもつ状態の確率がボルツマン因子 $\exp(-\beta E_i)$ に比例することを用いて，簡単な離散系の確率分布を求める問題'

      - id: "03_020"
        title: "分配関数の基本"
        difficulty: "基本"
        setup: 'カノニカル分布の分配関数 $Z=\sum_i \exp(-\beta E_i)$ を計算し，確率の規格化・平均エネルギー・自由エネルギーとの関係を理解する問題'

      - id: "03_030"
        title: "二準位系のカノニカル分布"
        difficulty: "標準"
        setup: 'エネルギー $0$ と $\epsilon$ の二準位をもつ粒子について分配関数を求め，平均エネルギー・比熱・低温極限と高温極限での振る舞いを解析する問題'

      - id: "03_040"
        title: "調和振動子の分配関数"
        difficulty: "標準"
        setup: '量子調和振動子のエネルギー準位 $E_n=\hbar\omega(n+1/2)$ に対して分配関数を計算し，平均エネルギーや比熱の温度依存性を求める問題'

      - id: "03_050"
        title: "自由エネルギーと熱力学量"
        difficulty: "標準"
        setup: 'ヘルムホルツ自由エネルギー $F=-k_BT\log Z$ を用いて，エントロピー・内部エネルギー・圧力・比熱などの熱力学量を分配関数から導出する問題'

      - id: "03_060"
        title: "エネルギー揺らぎと比熱"
        difficulty: "発展"
        setup: 'カノニカル分布におけるエネルギーの分散を計算し，エネルギー揺らぎが定積比熱と関係することを導出する問題'

      - id: "03_070"
        title: "古典極限と等分配則"
        difficulty: "発展"
        setup: '古典統計力学において二次形式で現れる自由度が平均エネルギー $k_BT/2$ を持つことを示し，理想気体や調和振動子の比熱に応用する問題'

  # ==========================================
  # 第4章：グランドカノニカル分布
  # ==========================================
  - theme: "グランドカノニカル分布と化学ポテンシャル"
    problems:
      - id: "04_010"
        title: "粒子数が変化する系"
        difficulty: "基本"
        setup: '温度・体積・化学ポテンシャルが一定で粒子数が変化しうる系を考え，グランドカノニカル分布を導入する必要性を理解する問題'

      - id: "04_020"
        title: "大分配関数"
        difficulty: "基本"
        setup: '大分配関数 $\Xi=\sum_N\sum_i \exp[-\beta(E_{i,N}-\mu N)]$ を定義し，平均粒子数やグランドポテンシャルとの関係を導出する問題'

      - id: "04_030"
        title: "平均粒子数と粒子数揺らぎ"
        difficulty: "標準"
        setup: 'グランドカノニカル分布を用いて平均粒子数と粒子数の分散を求め，粒子数揺らぎが圧縮率や応答関数と関係することを理解する問題'

      - id: "04_040"
        title: "理想気体の大分配関数"
        difficulty: "標準"
        setup: '古典理想気体について大分配関数を計算し，平均粒子数・圧力・化学ポテンシャルを求め，カノニカル分布から得られる結果と比較する問題'

      - id: "04_050"
        title: "グランドポテンシャルと状態方程式"
        difficulty: "標準"
        setup: 'グランドポテンシャル $\Omega=-k_BT\log\Xi$ を用いて，圧力や粒子数などの熱力学量を導出し，開いた系の熱力学との対応を理解する問題'

      - id: "04_060"
        title: "吸着模型とラングミュア等温式"
        difficulty: "発展"
        setup: '格子上の吸着サイトに粒子が入るか入らないかをグランドカノニカル分布で扱い，被覆率の化学ポテンシャル依存性やラングミュア型の等温式を導出する問題'

      - id: "04_070"
        title: "化学ポテンシャルの物理的意味"
        difficulty: "発展"
        setup: '粒子数を一つ増やすために必要な自由エネルギー変化として化学ポテンシャルを解釈し，粒子交換を許す二つの系の平衡条件と関連づける問題'

  # ==========================================
  # 第5章：古典理想気体とマクスウェル分布
  # ==========================================
  - theme: "古典理想気体と速度分布"
    problems:
      - id: "05_010"
        title: "古典理想気体の分配関数"
        difficulty: "基本"
        setup: '古典的な単原子理想気体について，一粒子分配関数と $N$ 粒子分配関数を計算し，粒子の不可区別性による $1/N!$ の因子の意味を理解する問題'

      - id: "05_020"
        title: "理想気体の状態方程式"
        difficulty: "基本"
        setup: '古典理想気体の分配関数からヘルムホルツ自由エネルギーを求め，圧力を計算することで状態方程式 $PV=Nk_BT$ を導出する問題'

      - id: "05_030"
        title: "マクスウェル速度分布"
        difficulty: "標準"
        setup: '三次元空間における単原子理想気体の速度分布をカノニカル分布から導出し，速度成分の分布と速さの分布の違いを理解する問題'

      - id: "05_040"
        title: "平均速度・最確速度・二乗平均平方根速度"
        difficulty: "標準"
        setup: 'マクスウェルの速さ分布を用いて，最確速度・平均速度・二乗平均平方根速度を求め，それぞれの物理的意味を比較する問題'

      - id: "05_050"
        title: "理想気体の内部エネルギーと比熱"
        difficulty: "標準"
        setup: '古典理想気体の分配関数から内部エネルギーを求め，単原子理想気体の定積比熱が $3Nk_B/2$ に対応することを導出する問題'

      - id: "05_060"
        title: "外力場中の理想気体"
        difficulty: "発展"
        setup: '重力場などの外力ポテンシャル中にある古典理想気体について，粒子密度分布がボルツマン因子に従うことを示し，気圧の高度依存性を導出する問題'

      - id: "05_070"
        title: "ビリアル展開"
        difficulty: "発展"
        setup: '相互作用する古典気体の状態方程式を密度のべき級数として表すビリアル展開を導入し，第2ビリアル係数が粒子間相互作用を反映することを理解する問題'

  # ==========================================
  # 第6章：量子統計の基礎
  # ==========================================
  - theme: "量子統計と同種粒子"
    problems:
      - id: "06_010"
        title: "同種粒子と波動関数の対称性"
        difficulty: "基本"
        setup: '量子力学における同種粒子の不可区別性を考え，ボソンでは波動関数が対称，フェルミオンでは反対称になることを理解する問題'

      - id: "06_020"
        title: "占有数表示"
        difficulty: "基本"
        setup: '単一粒子準位に粒子がどのように分布するかを占有数で表し，ボソンとフェルミオンで許される占有数が異なることを理解する問題'

      - id: "06_030"
        title: "フェルミ・ディラック分布"
        difficulty: "標準"
        setup: 'フェルミ粒子の各一粒子状態の平均占有数をグランドカノニカル分布から導出し，フェルミ・ディラック分布の温度依存性を解析する問題'

      - id: "06_040"
        title: "ボース・アインシュタイン分布"
        difficulty: "標準"
        setup: 'ボース粒子の各一粒子状態の平均占有数をグランドカノニカル分布から導出し，ボース・アインシュタイン分布と化学ポテンシャルの制約を理解する問題'

      - id: "06_050"
        title: "古典極限とマクスウェル・ボルツマン分布"
        difficulty: "標準"
        setup: 'フェルミ・ディラック分布およびボース・アインシュタイン分布が，低密度または高温の極限でマクスウェル・ボルツマン分布に近づくことを示す問題'

      - id: "06_060"
        title: "量子理想気体の大分配関数"
        difficulty: "発展"
        setup: '非相互作用量子気体について，一粒子準位ごとの占有数和を用いて大分配関数を構成し，ボソン系とフェルミオン系で符号や占有数の扱いが異なることを導出する問題'

      - id: "06_070"
        title: "状態密度"
        difficulty: "発展"
        setup: '箱の中の自由粒子のエネルギー準位を連続近似し，三次元における状態密度を導出して，量子理想気体の熱力学量計算に利用する問題'

  # ==========================================
  # 第7章：フェルミ気体
  # ==========================================
  - theme: "フェルミ気体と縮退圧"
    problems:
      - id: "07_010"
        title: "絶対零度のフェルミ気体"
        difficulty: "基本"
        setup: '絶対零度における理想フェルミ気体では低いエネルギー準位から順に占有されることを用い，フェルミエネルギーとフェルミ波数を求める問題'

      - id: "07_020"
        title: "フェルミ温度"
        difficulty: "基本"
        setup: 'フェルミエネルギーに対応する温度としてフェルミ温度を定義し，通常の温度と比較することでフェルミ縮退の条件を理解する問題'

      - id: "07_030"
        title: "絶対零度での内部エネルギー"
        difficulty: "標準"
        setup: '三次元自由フェルミ気体について状態密度を用いて絶対零度での全エネルギーを計算し，平均エネルギーがフェルミエネルギーの $3/5$ 倍になることを示す問題'

      - id: "07_040"
        title: "フェルミ気体の圧力"
        difficulty: "標準"
        setup: '絶対零度の自由フェルミ気体について，内部エネルギーの体積依存性または運動量流束の考え方から縮退圧を導出する問題'

      - id: "07_050"
        title: "低温フェルミ気体の比熱"
        difficulty: "発展"
        setup: '低温のフェルミ気体ではフェルミ面近傍の粒子のみが熱励起に寄与することを用いて，電子比熱が温度に比例することを導出する問題'

      - id: "07_060"
        title: "パウリ常磁性"
        difficulty: "発展"
        setup: '外部磁場中の電子気体において，スピンのゼーマン分裂によりフェルミ面近傍の占有数が変化することを考え，パウリ常磁性の磁化率を導出する問題'

      - id: "07_070"
        title: "白色矮星と縮退圧"
        difficulty: "発展"
        setup: '電子のフェルミ縮退圧が重力に抗して星を支えるという模型を考え，非相対論的なフェルミ気体の圧力と重力エネルギーのつり合いから白色矮星の半径依存性を見積もる問題'

  # ==========================================
  # 第8章：ボース気体・光子・フォノン
  # ==========================================
  - theme: "ボース気体・黒体放射・フォノン"
    problems:
      - id: "08_010"
        title: "理想ボース気体の粒子数"
        difficulty: "標準"
        setup: '理想ボース気体についてボース・アインシュタイン分布を用いて励起状態に存在できる粒子数を計算し，低温で基底状態占有が重要になることを理解する問題'

      - id: "08_020"
        title: "ボース・アインシュタイン凝縮"
        difficulty: "発展"
        setup: '三次元理想ボース気体において臨界温度以下で巨視的な数の粒子が基底状態に凝縮することを示し，凝縮粒子数の温度依存性を導出する問題'

      - id: "08_030"
        title: "光子気体と化学ポテンシャル"
        difficulty: "標準"
        setup: '空洞内の光子気体について，光子数が保存されないため化学ポテンシャルがゼロになることを理解し，光子の分布関数を導入する問題'

      - id: "08_040"
        title: "プランクの黒体放射法則"
        difficulty: "標準"
        setup: '電磁場のモードを量子調和振動子として扱い，光子のボース分布から黒体放射のスペクトル分布を導出する問題'

      - id: "08_050"
        title: "ステファン・ボルツマンの法則"
        difficulty: "標準"
        setup: 'プランク分布を周波数について積分することで黒体放射のエネルギー密度が温度の4乗に比例することを示し，放射強度との関係を求める問題'

      - id: "08_060"
        title: "アインシュタイン模型の固体比熱"
        difficulty: "標準"
        setup: '固体中の各原子を同じ振動数をもつ量子調和振動子として扱うアインシュタイン模型を用いて，低温と高温での比熱の振る舞いを解析する問題'

      - id: "08_070"
        title: "デバイ模型の固体比熱"
        difficulty: "発展"
        setup: '固体中の格子振動を音響フォノンの連続分布として扱うデバイ模型を用いて，低温で比熱が $T^3$ に比例することを導出する問題'

  # ==========================================
  # 第9章：揺らぎと応答
  # ==========================================
  - theme: "揺らぎ・応答関数・相関"
    problems:
      - id: "09_010"
        title: "エネルギー揺らぎ"
        difficulty: "基本"
        setup: 'カノニカル分布におけるエネルギーの平均値と分散を計算し，エネルギー揺らぎが熱容量に比例することを理解する問題'

      - id: "09_020"
        title: "粒子数揺らぎ"
        difficulty: "標準"
        setup: 'グランドカノニカル分布における粒子数の平均値と分散を求め，粒子数揺らぎが化学ポテンシャルに対する応答や圧縮率と関係することを示す問題'

      - id: "09_030"
        title: "磁化揺らぎと磁化率"
        difficulty: "標準"
        setup: '外部磁場中のスピン系を考え，磁化の揺らぎと磁化率の間に成り立つ関係をカノニカル分布から導出する問題'

      - id: "09_040"
        title: "揺動散逸関係の初歩"
        difficulty: "発展"
        setup: '平衡状態における自発的な揺らぎと外部摂動に対する線形応答が関係していることを，簡単なスピン系や調和振動子を例に理解する問題'

      - id: "09_050"
        title: "相関関数"
        difficulty: "発展"
        setup: '多体系における二点相関関数を定義し，相関長の概念を導入して，相転移近傍で相関が長距離化することを理解する問題'

      - id: "09_060"
        title: "中心極限定理と熱力学極限"
        difficulty: "発展"
        setup: '多数のほぼ独立な自由度をもつ系において，全体の揺らぎが相対的に小さくなることを中心極限定理の考え方から説明し，熱力学極限の意味を理解する問題'

  # ==========================================
  # 第10章：相転移とイジング模型
  # ==========================================
  - theme: "相転移・平均場理論・イジング模型"
    problems:
      - id: "10_010"
        title: "相転移と秩序変数"
        difficulty: "基本"
        setup: '相転移を特徴づける秩序変数の概念を導入し，強磁性体や液体気体転移を例に，対称性の破れや秩序の出現を理解する問題'

      - id: "10_020"
        title: "一次相転移と二次相転移"
        difficulty: "基本"
        setup: '一次相転移と二次相転移の違いを，自由エネルギーの微分の不連続性や潜熱の有無に注目して整理する問題'

      - id: "10_030"
        title: "一次元イジング模型"
        difficulty: "標準"
        setup: '最近接相互作用をもつ一次元イジング模型について，分配関数を転送行列法または直接的な方法で求め，有限温度で相転移が起こらないことを理解する問題'

      - id: "10_040"
        title: "平均場近似"
        difficulty: "標準"
        setup: '強磁性イジング模型に対して各スピンが周囲の平均磁化による有効磁場を感じると近似し，平均場方程式を導出する問題'

      - id: "10_050"
        title: "キュリー温度と自発磁化"
        difficulty: "標準"
        setup: '平均場方程式を用いてキュリー温度を求め，温度がキュリー温度より低いときに自発磁化が現れることを解析する問題'

      - id: "10_060"
        title: "ランダウ自由エネルギー"
        difficulty: "発展"
        setup: '秩序変数のべきで自由エネルギーを展開するランダウ理論を用いて，二次相転移における自発対称性の破れと臨界指数を導出する問題'

      - id: "10_070"
        title: "臨界揺らぎと平均場近似の限界"
        difficulty: "発展"
        setup: '相転移点近傍で相関長が大きくなり揺らぎが重要になることを考え，平均場近似が低次元系や臨界点近傍で破綻しうる理由を説明する問題'

  # ==========================================
  # 第11章：非平衡統計力学の入口
  # ==========================================
  - theme: "非平衡過程・輸送現象・緩和"
    problems:
      - id: "11_010"
        title: "詳細釣り合い"
        difficulty: "基本"
        setup: '確率的な状態遷移をもつ系において詳細釣り合い条件を導入し，それが平衡分布を保つための十分条件であることを理解する問題'

      - id: "11_020"
        title: "マスター方程式"
        difficulty: "標準"
        setup: '離散状態間を確率的に遷移する系についてマスター方程式を立て，定常分布や緩和時間を求める問題'

      - id: "11_030"
        title: "ランダムウォークと拡散"
        difficulty: "標準"
        setup: '一次元または三次元のランダムウォークを考え，平均二乗変位が時間に比例することを示し，拡散係数との関係を導出する問題'

      - id: "11_040"
        title: "拡散方程式"
        difficulty: "標準"
        setup: '粒子数保存則とフィックの法則を組み合わせて拡散方程式を導出し，簡単な初期条件のもとで濃度分布の時間発展を求める問題'

      - id: "11_050"
        title: "ブラウン運動とランジュバン方程式"
        difficulty: "発展"
        setup: '粘性抵抗とランダム力を受ける粒子の運動をランジュバン方程式で記述し，速度相関や平均二乗変位の時間依存性を解析する問題'

      - id: "11_060"
        title: "ボルツマン方程式の考え方"
        difficulty: "発展"
        setup: '一粒子分布関数の時間発展を記述するボルツマン方程式を導入し，衝突項・外力項・局所平衡分布の物理的意味を理解する問題'
    
   
	# ==========================================
  # 第12章：密度行列
  # ==========================================
  - theme: "密度行列と量子統計の基礎"
    problems:
      - id: "12_010"
        title: "純粋状態と混合状態"
        difficulty: "基本"
        setup: '量子状態を状態ベクトルで表せる純粋状態と，古典的確率混合として表される混合状態を比較し，密度行列を導入する必要性を理解する問題'

      - id: "12_020"
        title: "密度行列の導入"
        difficulty: "基本"
        setup: '状態 $|\psi_i\rangle$ が確率 $p_i$ で実現する混合状態に対して，密度行列 $\rho=\sum_i p_i|\psi_i\rangle\langle\psi_i|$ を定義し，物理量の期待値が $\langle A\rangle=\mathrm{Tr}(\rho A)$ で与えられることを示す問題'

      - id: "12_030"
        title: "密度行列の性質"
        difficulty: "標準"
        setup: '密度行列がエルミート性・半正定値性・規格化条件 $\mathrm{Tr}\rho=1$ を満たすことを確認し，純粋状態と混合状態を $\mathrm{Tr}\rho^2$ によって判定する問題'

      - id: "12_040"
        title: "部分系の密度行列"
        difficulty: "標準"
        setup: '合成系の密度行列から部分トレースを用いて部分系の縮約密度行列を求め，一方の部分系だけを観測すると混合状態として記述されることを理解する問題'

      - id: "12_050"
        title: "密度行列のユニタリー時間発展"
        difficulty: "標準"
        setup: '孤立した量子系の密度行列がフォン・ノイマン方程式 $i\hbar\,d\rho/dt=[H,\rho]$ に従って時間発展することを，シュレーディンガー方程式から導出する問題'

      - id: "12_060"
        title: "熱平衡状態の密度行列"
        difficulty: "標準"
        setup: '温度 $T$ の熱浴と接した量子系の平衡状態がカノニカル密度行列 $\rho=e^{-\beta H}/Z$ で表されることを用いて，分配関数・平均エネルギー・エントロピーを求める問題'

      - id: "12_070"
        title: "二準位系の密度行列"
        difficulty: "発展"
        setup: '二準位量子系の密度行列を行列表示し，ブロッホベクトルを用いて純粋状態・混合状態・熱平衡状態を幾何学的に表す問題'

  # ==========================================
  # 第13章：位相空間表示
  # ==========================================
  - theme: "ウィグナー分布関数と伏見関数"
    problems:
      - id: "13_010"
        title: "量子状態の位相空間表示の動機"
        difficulty: "基本"
        setup: '量子力学では位置と運動量を同時に確定できないことを踏まえ，古典統計力学の位相空間分布に対応する量子状態の表示方法が必要になる理由を理解する問題'

      - id: "13_020"
        title: "ウィグナー分布関数の定義"
        difficulty: "標準"
        setup: '一次元量子系の密度行列 $\rho(x,x^\prime)$ からウィグナー分布関数を定義し，位置分布や運動量分布が周辺分布として得られることを示す問題'

      - id: "13_030"
        title: "ガウス波束のウィグナー分布"
        difficulty: "標準"
        setup: '最小不確定性をもつガウス波束に対してウィグナー分布関数を計算し，位相空間上でガウス型分布として表されることを確認する問題'

      - id: "13_040"
        title: "ウィグナー分布の非古典性"
        difficulty: "発展"
        setup: 'ウィグナー分布関数は実関数である一方，一般には負の値を取りうることを理解し，負値性が量子状態の非古典性を示す指標となることを考察する問題'

      - id: "13_050"
        title: "ウィグナー分布の時間発展"
        difficulty: "発展"
        setup: '密度行列のフォン・ノイマン方程式からウィグナー分布関数の時間発展方程式を導き，古典極限でリウヴィル方程式に対応することを理解する問題'

      - id: "13_060"
        title: "伏見関数の定義"
        difficulty: "標準"
        setup: 'コヒーレント状態を用いて密度行列を位相空間上に写像し，伏見関数または Husimi Q 関数を定義して，正値な準確率分布としての性質を理解する問題'

      - id: "13_070"
        title: "ウィグナー分布と伏見関数の比較"
        difficulty: "発展"
        setup: '同じ量子状態に対してウィグナー分布関数と伏見関数を比較し，平滑化・正値性・量子干渉の見え方の違いを解析する問題'

  # ==========================================
  # 第14章：相互作用のない粒子系と量子状態
  # ==========================================
  - theme: "自由粒子・調和振動子・コヒーレント状態"
    problems:
      - id: "14_010"
        title: "自由粒子系のエネルギー準位"
        difficulty: "基本"
        setup: '箱の中の自由粒子について境界条件から運動量とエネルギー準位を求め，状態密度を導入して多数粒子系の統計力学に利用する問題'

      - id: "14_020"
        title: "自由粒子系の分配関数"
        difficulty: "標準"
        setup: '相互作用しない自由粒子系の一粒子分配関数を計算し，古典極限における理想気体の状態方程式や内部エネルギーを導出する問題'

      - id: "14_030"
        title: "量子調和振動子の熱平衡状態"
        difficulty: "標準"
        setup: '量子調和振動子のエネルギー準位 $E_n=\hbar\omega(n+1/2)$ を用いて分配関数を計算し，平均エネルギー・比熱・低温極限と高温極限での振る舞いを求める問題'

      - id: "14_040"
        title: "生成消滅演算子と数状態"
        difficulty: "標準"
        setup: '量子調和振動子に対して生成演算子と消滅演算子を導入し，数状態 $|n\rangle$ の性質やハミルトニアンの対角化を確認する問題'

      - id: "14_050"
        title: "コヒーレント状態"
        difficulty: "発展"
        setup: '消滅演算子の固有状態としてコヒーレント状態を定義し，最小不確定性・古典的な振動運動との対応・数状態展開を求める問題'

      - id: "14_060"
        title: "コヒーレント状態の時間発展"
        difficulty: "発展"
        setup: '調和振動子ハミルトニアンの下でコヒーレント状態が時間発展してもコヒーレント状態の形を保つことを示し，位相空間上での古典的運動との対応を解析する問題'

      - id: "14_070"
        title: "スクイーズド状態"
        difficulty: "発展"
        setup: '位置と運動量の不確定性の一方を減少させ，他方を増大させるスクイーズド状態を導入し，不確定性関係およびコヒーレント状態との違いを理解する問題'

      - id: "14_080"
        title: "スクイーズド状態のウィグナー分布"
        difficulty: "発展"
        setup: 'スクイーズド状態のウィグナー分布関数を考え，位相空間上で楕円状に変形したガウス分布として表されることを確認する問題'

  # ==========================================
  # 第15章：情報と熱力学
  # ==========================================
  - theme: "エントロピー・情報・熱力学第二法則"
    problems:
      - id: "15_010"
        title: "密度行列のエントロピー"
        difficulty: "基本"
        setup: '密度行列 $\rho$ に対してフォン・ノイマンエントロピー $S=-k_B\mathrm{Tr}(\rho\log\rho)$ を定義し，純粋状態ではゼロ，混合状態では正となることを確認する問題'

      - id: "15_020"
        title: "熱平衡状態とエントロピー最大化"
        difficulty: "標準"
        setup: 'エネルギー期待値が固定された条件のもとでフォン・ノイマンエントロピーを最大化すると，カノニカル密度行列 $\rho=e^{-\beta H}/Z$ が得られることを示す問題'

      - id: "15_030"
        title: "量子相対エントロピー"
        difficulty: "標準"
        setup: '二つの密度行列 $\rho$ と $\sigma$ に対して量子相対エントロピーを定義し，平衡状態からのずれや自由エネルギー差との関係を理解する問題'

      - id: "15_040"
        title: "熱力学第二法則と情報"
        difficulty: "発展"
        setup: '孤立系または熱浴と接した系におけるエントロピー生成を，情報の喪失や相対エントロピーの減少性と関連づけて理解する問題'

      - id: "15_050"
        title: "シャノンエントロピー"
        difficulty: "基本"
        setup: '離散確率分布に対するシャノンエントロピー $H=-\sum_i p_i\log p_i$ を定義し，確率分布の不確定性を測る量としての意味を理解する問題'

      - id: "15_060"
        title: "相互情報量"
        difficulty: "標準"
        setup: '二つの確率変数の相関を測る量として相互情報量を定義し，独立な場合にはゼロとなることや，結合分布と周辺分布の関係を用いて計算する問題'

      - id: "15_070"
        title: "マックスウェルの悪魔"
        difficulty: "発展"
        setup: 'マックスウェルの悪魔の思考実験を通して，測定・情報取得・フィードバック制御・記憶消去が熱力学第二法則とどのように整合するかを考察する問題'

      - id: "15_080"
        title: "ランダウアーの原理"
        difficulty: "発展"
        setup: '一ビットの情報を消去する際に少なくとも $k_BT\log 2$ の熱が環境へ放出されるというランダウアーの原理を用いて，情報処理と熱力学的コストの関係を理解する問題'

  # ==========================================
  # 第16章：量子もつれと開放量子系
  # ==========================================
  - theme: "量子もつれ・ベル不等式・リンドブラッド方程式"
    problems:
      - id: "16_010"
        title: "合成系と分離可能状態"
        difficulty: "基本"
        setup: '二つの量子系からなる合成系の状態をテンソル積で表し，積状態・混合分離状態・もつれ状態の違いを密度行列の観点から理解する問題'

      - id: "16_020"
        title: "シュミット分解"
        difficulty: "標準"
        setup: '二部系の純粋状態に対してシュミット分解を行い，シュミット係数の個数や値から量子もつれの有無を判定する問題'

      - id: "16_030"
        title: "ベル状態"
        difficulty: "標準"
        setup: '二つのスピン $1/2$ 系からなるベル状態を具体的に書き下し，部分系の縮約密度行列が混合状態になることを計算によって確認する問題'

      - id: "16_040"
        title: "ベルの不等式"
        difficulty: "発展"
        setup: '局所実在論に基づく相関に制限があることをベルの不等式として表し，量子力学的なスピン相関がその不等式を破る場合があることを示す問題'

      - id: "16_050"
        title: "エンタングルメントエントロピー"
        difficulty: "発展"
        setup: '二部系純粋状態の一方の部分系を部分トレースして縮約密度行列を求め，そのフォン・ノイマンエントロピーを計算することで量子もつれの強さを評価する問題'

      - id: "16_060"
        title: "開放量子系の非ユニタリー時間発展"
        difficulty: "発展"
        setup: '対象系が環境と相互作用する場合，対象系のみの縮約密度行列の時間発展が一般にユニタリーではなくなることを理解し，散逸やデコヒーレンスの概念を導入する問題'

      - id: "16_070"
        title: "リンドブラッド方程式"
        difficulty: "発展"
        setup: 'マルコフ近似のもとで開放量子系の密度行列がリンドブラッド方程式に従うことを導入し，ハミルトン項・散逸項・ジャンプ演算子の物理的意味を理解する問題'

      - id: "16_080"
        title: "二準位系の緩和とデコヒーレンス"
        difficulty: "発展"
        setup: '二準位系が環境と相互作用する状況をリンドブラッド方程式で記述し，エネルギー緩和と位相緩和が密度行列の対角成分・非対角成分に与える影響を解析する問題'   