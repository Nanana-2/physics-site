mechanics:
  # ==========================================
  # 第1章：運動学と座標系
  # ==========================================
  - theme: "運動学と座標系"
    problems:
      - id: "01_010"
        title: "等加速度運動の一般解"
        difficulty: "基本"
        setup: '一定の加速度を受ける質点について、初期位置・初期速度を与えて位置・速度・加速度の時間依存性を求め、運動学的な基本公式を導出する問題'

      - id: "01_020"
        title: "相対運動と相対速度"
        difficulty: "基本"
        setup: '二つの質点の位置ベクトルを用いて相対位置・相対速度・相対加速度を定義し、一方の質点から見た他方の運動を記述する問題'

      - id: "01_030"
        title: "極座標における速度と加速度"
        difficulty: "標準"
        setup: '平面極座標 $(r,\theta)$ を用いて質点の速度と加速度を導出し、動径方向成分と角方向成分に分解して運動を記述する問題'

      - id: "01_040"
        title: "円運動の速度と加速度"
        difficulty: "基本"
        setup: '等速円運動および角速度が時間変化する円運動について、向心加速度と接線加速度を求め、ベクトルとしての加速度の意味を理解する問題'

      - id: "01_050"
        title: "放物運動と到達距離"
        difficulty: "基本"
        setup: '重力のみを受ける斜方投射運動について、軌道方程式、最高点、飛行時間、水平到達距離を初期速度と投射角から求める問題'

      - id: "01_060"
        title: "拘束条件つき運動の運動学"
        difficulty: "標準"
        setup: '糸や滑車によって結ばれた複数の物体について、長さ一定条件から速度・加速度の関係を導き、運動方程式を立てる前段階として拘束条件を整理する問題'

  # ==========================================
  # 第2章：運動方程式と力学の基本
  # ==========================================
  - theme: "運動方程式と力学の基本"
    problems:
      - id: "02_010"
        title: "斜面上の束縛運動と摩擦"
        difficulty: "基本"
        setup: '傾斜角 $\theta$ の粗い斜面上を運動する質量 $m$ の物体について、静止摩擦係数と動摩擦係数の違いを考慮し、運動開始条件および運動方程式を立式して時間発展を求める問題'

      - id: "02_020"
        title: "張力を含む連結物体の運動"
        difficulty: "基本"
        setup: '糸と滑車で結ばれた複数の物体について、それぞれの物体に働く力を整理し、張力と加速度を連立運動方程式から求める問題'

      - id: "02_030"
        title: "速度比例抵抗を受ける落下"
        difficulty: "標準"
        setup: '重力と速度に比例する抵抗力 $F=-kv$ を受ける質点の鉛直落下について、運動方程式を立てて解き、時間発展および終端速度を求める問題'

      - id: "02_040"
        title: "二乗抵抗を受ける運動"
        difficulty: "標準"
        setup: '空気抵抗が速度の二乗に比例する $F=-kv^2$ の形で働く場合の運動方程式を立て、終端速度や速度の時間変化を解析する問題'

      - id: "02_050"
        title: "時間に依存する外力を受ける運動"
        difficulty: "標準"
        setup: '時間に依存する外力 $F(t)$ を受ける質点について、運動方程式を積分して速度と位置を求め、力積との関係を理解する問題'

      - id: "02_060"
        title: "質量変化系とロケット方程式"
        difficulty: "発展"
        setup: '質量が時間とともに変化する系としてロケットの運動を考え、噴射速度を一定として運動量保存則を適用し、ツィオルコフスキーの公式を導出する問題'

      - id: "02_070"
        title: "連成運動の基本"
        difficulty: "発展"
        setup: '複数の質点がばねや糸で結合された系について、それぞれの運動方程式を立てて連立微分方程式として扱い、系の時間発展を議論する問題'

  # ==========================================
  # 第3章：仕事とエネルギー保存則
  # ==========================================
  - theme: "仕事とエネルギー保存則"
    problems:
      - id: "03_010"
        title: "仕事と運動エネルギー定理"
        difficulty: "基本"
        setup: '質点に働く力がする仕事を線積分として定義し、ニュートンの運動方程式から仕事と運動エネルギー変化の関係を導出する問題'

      - id: "03_020"
        title: "保存力とポテンシャルエネルギー"
        difficulty: "基本"
        setup: '重力やばねの力のような保存力について、仕事が経路によらないことを確認し、ポテンシャルエネルギーを導入して力との関係を求める問題'

      - id: "03_030"
        title: "力学的エネルギー保存則"
        difficulty: "基本"
        setup: '保存力のみが働く質点の運動について、運動エネルギーとポテンシャルエネルギーの和が保存されることを示し、具体的な運動の解析に応用する問題'

      - id: "03_040"
        title: "非保存力とエネルギー散逸"
        difficulty: "標準"
        setup: '摩擦力や抵抗力のような非保存力が働く場合について、力学的エネルギーが保存されないことを仕事の観点から理解し、失われたエネルギーを計算する問題'

      - id: "03_050"
        title: "一次元ポテンシャル中の運動"
        difficulty: "標準"
        setup: '一次元ポテンシャル $U(x)$ 中の質点の運動について、エネルギー保存則を用いて運動可能領域、転回点、平衡点の安定性を解析する問題'

      - id: "03_060"
        title: "エネルギー積分による運動の解析"
        difficulty: "発展"
        setup: '一次元保存力場においてエネルギー保存則から速度を位置の関数として表し、積分によって周期や到達時間を求める問題'

      - id: "03_070"
        title: "ポテンシャルの展開と安定平衡"
        difficulty: "発展"
        setup: '平衡点近傍でポテンシャルをテイラー展開し、二次の項から安定性や小振動の角振動数を求める問題'

  # ==========================================
  # 第4章：運動量・力積・衝突
  # ==========================================
  - theme: "運動量・力積・衝突"
    problems:
      - id: "04_010"
        title: "運動量保存則"
        difficulty: "基本"
        setup: '外力が働かない複数粒子系について、全運動量が保存されることをニュートンの運動方程式から導出し、重心運動との関係を理解する問題'

      - id: "04_020"
        title: "力積と運動量変化"
        difficulty: "基本"
        setup: '短時間に大きな力が働く場合について、力積が運動量変化に等しいことを用いて、衝突や打撃を受ける物体の速度変化を求める問題'

      - id: "04_030"
        title: "一次元弾性衝突"
        difficulty: "標準"
        setup: '二つの質点の一次元弾性衝突について、運動量保存則と力学的エネルギー保存則を用いて衝突後の速度を求める問題'

      - id: "04_040"
        title: "非弾性衝突と反発係数"
        difficulty: "標準"
        setup: '反発係数を用いて一次元衝突を記述し、完全非弾性衝突を含む一般的な衝突後速度と失われる力学的エネルギーを求める問題'

      - id: "04_050"
        title: "重心系で見る衝突"
        difficulty: "標準"
        setup: '二体衝突を実験室系と重心系で比較し、重心系では衝突の記述が簡単になることを速度変換と保存則から理解する問題'

      - id: "04_060"
        title: "二次元衝突"
        difficulty: "発展"
        setup: '平面内で起こる二体衝突について、運動量保存則を成分ごとに適用し、散乱角や衝突後の速度を求める問題'

      - id: "04_070"
        title: "可変質量系と運動量収支"
        difficulty: "発展"
        setup: 'ロケットや雨滴のように質量が出入りする系について、運動量保存則を適用する際の系の取り方に注意しながら運動方程式を導く問題'

  # ==========================================
  # 第5章：単振動・減衰振動・強制振動
  # ==========================================
  - theme: "単振動・減衰振動・強制振動"
    problems:
      - id: "05_010"
        title: "単振動の基本"
        difficulty: "基本"
        setup: 'ばね定数 $k$ のばねに質量 $m$ の質点を接続した系について運動方程式を立て、単振動の解として位置・速度・加速度の時間依存性を求める問題'

      - id: "05_020"
        title: "単振り子の微小振動"
        difficulty: "基本"
        setup: '長さ $l$ の単振り子について小角近似 $\sin\theta \approx \theta$ を用い、角振動数および周期を導出する問題'

      - id: "05_030"
        title: "物理振り子"
        difficulty: "標準"
        setup: '剛体が固定点のまわりに微小振動する物理振り子について、重心位置と慣性モーメントを用いて周期を導出する問題'

      - id: "05_040"
        title: "減衰振動の分類"
        difficulty: "標準"
        setup: '速度比例の抵抗力を受ける振動系について運動方程式を解き、過減衰・臨界減衰・不足減衰の条件とそれぞれの解の特徴を分類する問題'

      - id: "05_050"
        title: "振動エネルギーの減衰"
        difficulty: "標準"
        setup: '減衰振動において運動エネルギーとポテンシャルエネルギーの時間変化を解析し、全エネルギーが指数関数的に減衰することを示す問題'

      - id: "05_060"
        title: "強制振動と共鳴"
        difficulty: "発展"
        setup: '周期外力 $F=F_0\cos\omega t$ を受ける振動系について、定常解を求め振幅および位相差の周波数依存性を解析する問題'

      - id: "05_070"
        title: "Q値と共鳴特性"
        difficulty: "発展"
        setup: '減衰振動における品質係数 Q を導入し、共鳴の鋭さやエネルギー散逸との関係を理論的に議論する問題'

  # ==========================================
  # 第6章：連成振動と小振動
  # ==========================================
  - theme: "連成振動と小振動"
    problems:
      - id: "06_010"
        title: "二つの質点の連成振動"
        difficulty: "標準"
        setup: '二つの質点がばねで結合された系について運動方程式を立て、連立微分方程式を解いて二つの基準振動数と振動モードを求める問題'

      - id: "06_020"
        title: "基準座標と基準振動"
        difficulty: "標準"
        setup: '多自由度振動系について、適切な線形結合により運動方程式を独立な基準座標に分解し、基準振動の物理的意味を理解する問題'

      - id: "06_030"
        title: "固有値問題としての小振動"
        difficulty: "標準"
        setup: '平衡点まわりでポテンシャルを二次まで展開し、質量行列と剛性行列を用いて小振動を固有値問題として定式化する問題'

      - id: "06_040"
        title: "二重振り子の小振動"
        difficulty: "発展"
        setup: '二つの振り子が連結された二重振り子について、小角近似のもとでラグランジアンを作り、基準振動数と振動モードを求める問題'

      - id: "06_050"
        title: "連続体への極限"
        difficulty: "発展"
        setup: '多数の質点がばねで一次元的に結合された系について、格子間隔を小さくする極限で波動方程式が得られることを示す問題'

      - id: "06_060"
        title: "分散関係と波の伝播"
        difficulty: "発展"
        setup: '一次元格子振動の分散関係を求め、位相速度・群速度・長波長極限での波の伝播を解析する問題'

  # ==========================================
  # 第7章：中心力場と軌道運動
  # ==========================================
  - theme: "中心力場と軌道運動"
    problems:
      - id: "07_010"
        title: "角運動量保存則"
        difficulty: "基本"
        setup: '中心力の性質からトルクがゼロであることを示し、角運動量保存則と面積速度一定の法則を導出する問題'

      - id: "07_020"
        title: "円軌道の条件"
        difficulty: "基本"
        setup: '万有引力やクーロン力のような中心力を受ける質点の円運動について、必要な速度、角振動数、周期を導出する問題'

      - id: "07_030"
        title: "脱出速度の導出"
        difficulty: "基本"
        setup: '重力場中で束縛されないための条件としての脱出速度をエネルギー保存則から導出する問題'

      - id: "07_040"
        title: "有効ポテンシャル"
        difficulty: "標準"
        setup: '中心力問題を極座標で扱い、角運動量保存則を用いて有効ポテンシャルを導入し、動径方向の運動として解析する問題'

      - id: "07_050"
        title: "楕円軌道とケプラーの法則"
        difficulty: "標準"
        setup: '万有引力下での運動について軌道方程式を用い、楕円軌道の性質およびケプラーの法則を導出する問題'

      - id: "07_060"
        title: "軌道の分類"
        difficulty: "標準"
        setup: '力学的エネルギーの符号によって軌道が楕円・放物線・双曲線に分類されることを示す問題'

      - id: "07_070"
        title: "ラザフォード散乱"
        difficulty: "発展"
        setup: 'クーロン反発による散乱問題について軌道方程式を積分し、散乱角と衝突パラメータとの関係を導出する問題'

  # ==========================================
  # 第8章：非慣性系
  # ==========================================
  - theme: "並進加速系と回転座標系"
    problems:
      - id: "08_010"
        title: "加速系での運動方程式"
        difficulty: "基本"
        setup: '一定加速度で運動する座標系において運動方程式を導入し、慣性力の概念を明確にする問題'

      - id: "08_020"
        title: "見かけの重力"
        difficulty: "基本"
        setup: '加速する系において重力と慣性力の合成として見かけの重力を導入し、その方向と大きさを求める問題'

      - id: "08_030"
        title: "遠心力の導出"
        difficulty: "標準"
        setup: '等角速度で回転する座標系において遠心力の項を導入し、その物理的意味を理解する問題'

      - id: "08_040"
        title: "コリオリ力の影響"
        difficulty: "標準"
        setup: '回転系で運動する粒子の軌道を求め、コリオリ力による偏向を解析する問題'

      - id: "08_050"
        title: "回転座標系の運動方程式"
        difficulty: "標準"
        setup: '回転角速度ベクトルを用いて一般的な運動方程式をベクトル形式で導出し、遠心力・コリオリ力・オイラー力を整理する問題'

      - id: "08_060"
        title: "フーコーの振り子"
        difficulty: "発展"
        setup: '地球自転の影響を受ける振り子の運動を解析し、緯度に依存して振動面が回転する角速度を導出する問題'

  # ==========================================
  # 第9章：剛体の力学
  # ==========================================
  - theme: "剛体の力学"
    problems:
      - id: "09_010"
        title: "慣性モーメントの導出"
        difficulty: "基本"
        setup: '棒・円盤・球などの基本的な剛体について慣性モーメントを積分により計算する問題'

      - id: "09_020"
        title: "平行軸の定理"
        difficulty: "基本"
        setup: '慣性モーメントに関する平行軸の定理を導出し、その物理的意味を説明する問題'

      - id: "09_030"
        title: "剛体の固定軸まわりの回転"
        difficulty: "基本"
        setup: '固定軸まわりに回転する剛体について、トルク、角加速度、慣性モーメントの関係を用いて運動方程式を立てる問題'

      - id: "09_040"
        title: "転がり運動"
        difficulty: "標準"
        setup: '滑らずに転がる円柱や球について並進運動と回転運動を連立して解き、摩擦力の役割を理解する問題'

      - id: "09_050"
        title: "回転運動とエネルギー"
        difficulty: "標準"
        setup: '剛体の運動エネルギーを並進成分と回転成分に分解し、その保存則を転がり運動や振り子型の剛体運動に適用する問題'

      - id: "09_060"
        title: "撃力と角運動量"
        difficulty: "発展"
        setup: '短時間に働く力（撃力）を考え、角運動量の変化と回転運動の開始条件を求める問題'

      - id: "09_070"
        title: "コマの歳差運動"
        difficulty: "発展"
        setup: '重力下で回転する対称コマについてトルクによる角運動量の変化を考え、歳差運動の角速度を導出する問題'

  # ==========================================
  # 第10章：ラグランジュ力学
  # ==========================================
  - theme: "ラグランジュ力学"
    problems:
      - id: "10_010"
        title: "ラグランジアンの構成"
        difficulty: "基本"
        setup: '一般化座標を導入し、具体的な系に対して運動エネルギーとポテンシャルエネルギーからラグランジアンを構成して運動方程式を導出する問題'

      - id: "10_020"
        title: "オイラー・ラグランジュ方程式"
        difficulty: "基本"
        setup: '変分原理からオイラー・ラグランジュ方程式を導出し、その物理的意味を理解する問題'

      - id: "10_030"
        title: "拘束条件と一般化座標"
        difficulty: "標準"
        setup: '拘束条件をもつ系について、独立な一般化座標を選ぶことで拘束力を明示せずに運動方程式を導く方法を理解する問題'

      - id: "10_040"
        title: "ラグランジュ未定乗数法"
        difficulty: "標準"
        setup: '拘束条件を持つ系に対してラグランジュ未定乗数法を適用し、運動方程式と拘束力を同時に求める問題'

      - id: "10_050"
        title: "循環座標と保存量"
        difficulty: "標準"
        setup: 'ラグランジアンに明示的に現れない一般化座標が存在する場合、その共役運動量が保存されることを示し、具体的な系に応用する問題'

      - id: "10_060"
        title: "ラグランジュ形式による連成振動"
        difficulty: "発展"
        setup: '複数自由度系の振動についてラグランジアンを用いて運動方程式を立て、固有値問題として基準振動を求める問題'

  # ==========================================
  # 第11章：ハミルトン力学と正準構造
  # ==========================================
  - theme: "ハミルトン力学と正準構造"
    problems:
      - id: "11_010"
        title: "ルジャンドル変換とハミルトニアン"
        difficulty: "標準"
        setup: 'ラグランジアンから一般化運動量を定義し、ルジャンドル変換によってハミルトニアンを導出する問題'

      - id: "11_020"
        title: "正準方程式"
        difficulty: "標準"
