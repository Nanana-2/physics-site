mechanics:

  - theme: "運動方程式と簡単な微分方程式"
    problems:
      - id: "01_010"
        title: "斜面上の束縛運動と摩擦"
        difficulty: "基本"
        setup: "傾斜角 $\theta$ の粗い斜面上を運動する質量 $m$ の物体について、静止摩擦係数と動摩擦係数の違いを考慮し、運動開始条件および運動方程式を立式して時間発展を求める問題"

      - id: "01_020"
        title: "等加速度運動の一般解"
        difficulty: "基本"
        setup: "一定の外力を受ける質点について、初期位置・初期速度を与えて運動方程式を解き、位置と速度の時間依存性を導出する問題"

      - id: "01_030"
        title: "速度比例抵抗を受ける落下"
        difficulty: "標準"
        setup: "重力と速度に比例する抵抗力 $F=-kv$ を受ける質点の鉛直落下について、運動方程式を立てて解き、時間発展および終端速度を求める問題"

      - id: "01_040"
        title: "二乗抵抗を受ける運動"
        difficulty: "標準"
        setup: "空気抵抗が速度の二乗に比例する $F=-kv^2$ の形で働く場合の運動方程式を立て、速度や位置の時間変化を近似的に解析する問題"

      - id: "01_050"
        title: "慣性系と非慣性系"
        difficulty: "基本"
        setup: "加速度を持つ座標系における運動を考え、慣性系との違いを明確にしながら慣性力（見かけの力）を導入し、その物理的意味を説明する問題"

      - id: "01_060"
        title: "質量変化系（ロケット方程式）"
        difficulty: "発展"
        setup: "質量が時間とともに変化する系としてロケットの運動を考え、噴射速度を一定として運動量保存則を適用し、ツィオルコフスキーの公式を導出する問題"

      - id: "01_070"
        title: "連成運動の基本"
        difficulty: "発展"
        setup: "複数の質点がばねなどで結合された系について、それぞれの運動方程式を立てて連立微分方程式として扱い、系の時間発展を議論する問題"

  # ==========================================
  - theme: "単振動・減衰振動・強制振動"
    problems:
      - id: "02_010"
        title: "単振動の基本"
        difficulty: "基本"
        setup: "ばね定数 $k$ のばねに質量 $m$ の質点を接続した系について運動方程式を立て、単振動の解として位置・速度・加速度の時間依存性を求める問題"

      - id: "02_020"
        title: "単振り子の微小振動"
        difficulty: "基本"
        setup: "長さ $l$ の単振り子について小角近似 $\sin\theta \approx \theta$ を用い、角振動数および周期を導出する問題"

      - id: "02_030"
        title: "減衰振動の分類"
        difficulty: "標準"
        setup: "速度比例の抵抗力を受ける振動系について運動方程式を解き、過減衰・臨界減衰・不足減衰の条件とそれぞれの解の特徴を分類する問題"

      - id: "02_040"
        title: "振動エネルギーの減衰"
        difficulty: "標準"
        setup: "減衰振動において運動エネルギーとポテンシャルエネルギーの時間変化を解析し、全エネルギーが指数関数的に減衰することを示す問題"

      - id: "02_050"
        title: "強制振動と共鳴"
        difficulty: "標準"
        setup: "周期外力 $F=F_0\cos\omega t$ を受ける振動系について、定常解を求め振幅および位相差の周波数依存性を解析する問題"

      - id: "02_060"
        title: "複素数を用いた強制振動解析"
        difficulty: "発展"
        setup: "強制振動の問題を複素数表示を用いて解き、実部を取ることで解を導出し、解法の利点を理解する問題"

      - id: "02_070"
        title: "Q値と共鳴特性"
        difficulty: "発展"
        setup: "減衰振動における品質係数 Q を導入し、共鳴の鋭さやエネルギー散逸との関係を理論的に議論する問題"

  # ==========================================
  - theme: "万有引力と軌道運動"
    problems:
      - id: "03_010"
        title: "円軌道の条件"
        difficulty: "基本"
        setup: "万有引力を受ける質点の円運動について、必要な速度や周期を導出する問題"

      - id: "03_020"
        title: "脱出速度の導出"
        difficulty: "基本"
        setup: "重力場中で束縛されないための条件としての脱出速度をエネルギー保存則から導出する問題"

      - id: "03_030"
        title: "有効ポテンシャル"
        difficulty: "標準"
        setup: "中心力問題を極座標で扱い、角運動量保存則を用いて有効ポテンシャルを導入し、運動の性質を解析する問題"

      - id: "03_040"
        title: "楕円軌道とケプラーの法則"
        difficulty: "標準"
        setup: "万有引力下での運動について軌道方程式を用い、楕円軌道の性質およびケプラーの法則を導出する問題"

      - id: "03_050"
        title: "軌道の分類"
        difficulty: "標準"
        setup: "力学的エネルギーの符号によって軌道が楕円・放物線・双曲線に分類されることを示す問題"

      - id: "03_060"
        title: "ラザフォード散乱"
        difficulty: "発展"
        setup: "クーロン反発による散乱問題について軌道方程式を積分し、散乱角と衝突パラメータとの関係を導出する問題"

      - id: "03_070"
        title: "角運動量保存則の導出"
        difficulty: "発展"
        setup: "中心力の性質からトルクがゼロであることを示し、角運動量保存則を導出する問題"

  # ==========================================
  - theme: "並進加速系と回転座標系"
    problems:
      - id: "04_010"
        title: "加速系での運動方程式"
        difficulty: "基本"
        setup: "一定加速度で運動する座標系において運動方程式を導入し、慣性力の概念を明確にする問題"

      - id: "04_020"
        title: "見かけの重力"
        difficulty: "基本"
        setup: "加速する系において重力と慣性力の合成として見かけの重力を導入し、その方向と大きさを求める問題"

      - id: "04_030"
        title: "遠心力の導出"
        difficulty: "標準"
        setup: "等角速度で回転する座標系において遠心力の項を導入し、その物理的意味を理解する問題"

      - id: "04_040"
        title: "コリオリ力の影響"
        difficulty: "標準"
        setup: "回転系で運動する粒子の軌道を求め、コリオリ力による偏向を解析する問題"

      - id: "04_050"
        title: "回転座標系の運動方程式"
        difficulty: "標準"
        setup: "回転角速度ベクトルを用いて一般的な運動方程式をベクトル形式で導出する問題"

      - id: "04_060"
        title: "フーコーの振り子"
        difficulty: "発展"
        setup: "地球自転の影響を受ける振り子の運動を解析し、振動面の回転角速度を導出する問題"

  # ==========================================
  - theme: "剛体の運動"
    problems:
      - id: "05_010"
        title: "慣性モーメントの導出"
        difficulty: "基本"
        setup: "棒・円盤・球などの基本的な剛体について慣性モーメントを積分により計算する問題"

      - id: "05_020"
        title: "平行軸の定理"
        difficulty: "基本"
        setup: "慣性モーメントに関する平行軸の定理を導出し、その物理的意味を説明する問題"

      - id: "05_030"
        title: "転がり運動"
        difficulty: "標準"
        setup: "滑らずに転がる円柱や球について並進運動と回転運動を連立して解く問題"

      - id: "05_040"
        title: "回転運動とエネルギー"
        difficulty: "標準"
        setup: "剛体の運動エネルギーを並進成分と回転成分に分解し、その保存則を適用する問題"

      - id: "05_050"
        title: "撃力と角運動量"
        difficulty: "発展"
        setup: "短時間に働く力（撃力）を考え、角運動量の変化と回転運動の開始条件を求める問題"

      - id: "05_060"
        title: "コマの歳差運動"
        difficulty: "発展"
        setup: "重力下で回転する対称コマについてトルクによる角運動量の変化を考え、歳差運動の角速度を導出する問題"

  # ==========================================
  - theme: "ラグランジュ力学とハミルトン力学"
    problems:
      - id: "06_010"
        title: "ラグランジアンの構成"
        difficulty: "基本"
        setup: "一般化座標を導入し、具体的な系に対してラグランジアンを記述して運動方程式を導出する問題"

      - id: "06_020"
        title: "オイラー・ラグランジュ方程式"
        difficulty: "基本"
        setup: "変分原理からオイラー・ラグランジュ方程式を導出し、その物理的意味を理解する問題"

      - id: "06_030"
        title: "拘束条件と未定乗数法"
        difficulty: "標準"
        setup: "拘束条件を持つ系に対してラグランジュ未定乗数法を適用し、運動方程式を導出する問題"

      - id: "06_040"
        title: "連成振動とモード解析"
        difficulty: "標準"
        setup: "複数自由度系の振動についてラグランジアンを用いて運動方程式を立て、固有値問題として基準振動を求める問題"

      - id: "06_050"
        title: "正準方程式"
        difficulty: "発展"
        setup: "ラグランジアンからハミルトニアンを導出し、正準方程式の形で運動を記述する問題"

      - id: "06_060"
        title: "ポアソン括弧と保存量"
        difficulty: "発展"
        setup: "ポアソン括弧の定義を用いて物理量の時間発展を記述し、保存量の判定条件を導く問題"