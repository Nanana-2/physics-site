quantum_mechanics:
  # ==========================================
  # 第1章：波動関数とシュレーディンガー方程式
  # ==========================================
  - theme: "波動関数・確率解釈・シュレーディンガー方程式"
    problems:
      - id: "01_010"
        title: "波動関数の規格化"
        difficulty: "基本"
        setup: '一次元空間における波動関数 $\psi(x)$ が与えられたとき，確率解釈に基づいて規格化定数を求め，粒子が特定の領域に存在する確率を計算する問題'

      - id: "01_020"
        title: "期待値と分散"
        difficulty: "基本"
        setup: '波動関数を用いて位置・運動量・エネルギーなどの物理量の期待値と分散を計算し，量子力学における測定値の統計的意味を理解する問題'

      - id: "01_030"
        title: "運動量演算子と交換関係"
        difficulty: "基本"
        setup: '位置表示における運動量演算子 $\hat{p}=-i\hbar d/dx$ を用いて，位置演算子との正準交換関係 $[\hat{x},\hat{p}]=i\hbar$ を確認する問題'

      - id: "01_040"
        title: "時間依存シュレーディンガー方程式"
        difficulty: "標準"
        setup: '時間依存シュレーディンガー方程式を用いて波動関数の時間発展を求め，ハミルトニアンの固有状態が定常状態になることを理解する問題'

      - id: "01_050"
        title: "確率保存と連続の式"
        difficulty: "標準"
        setup: '時間依存シュレーディンガー方程式から確率密度と確率流密度を導入し，確率保存を表す連続の式を導出する問題'

      - id: "01_060"
        title: "エルミート演算子と固有値"
        difficulty: "標準"
        setup: '物理量を表す演算子がエルミートであることの意味を理解し，固有値が実数であることや異なる固有値に属する固有関数の直交性を示す問題'

      - id: "01_070"
        title: "不確定性関係"
        difficulty: "発展"
        setup: '位置と運動量の交換関係からハイゼンベルクの不確定性関係 $\Delta x\Delta p\geq \hbar/2$ を導出し，ガウス波束が最小不確定性状態であることを確認する問題'

  # ==========================================
  # 第2章：ブラケット記法と量子力学の描像
  # ==========================================
  - theme: "ブラケット記法と量子力学の描像"
    problems:
      - id: "02_010"
        title: "ブラケット記法の基本"
        difficulty: "基本"
        setup: 'ケット $|\psi\rangle$，ブラ $\langle\psi|$，内積 $\langle\phi|\psi\rangle$，外積 $|\phi\rangle\langle\psi|$ の意味を整理し，状態ベクトルと線形演算子を抽象的に扱う方法を理解する問題'

      - id: "02_020"
        title: "完全性関係と基底展開"
        difficulty: "基本"
        setup: '正規直交基底 $\{|n\rangle\}$ に対して完全性関係 $\sum_n |n\rangle\langle n|=1$ を用い，任意の状態ベクトルや演算子を基底で展開する問題'

      - id: "02_030"
        title: "位置表示と運動量表示"
        difficulty: "標準"
        setup: '抽象的な状態 $|\psi\rangle$ を位置固有状態や運動量固有状態で展開し，波動関数 $\psi(x)=\langle x|\psi\rangle$ および運動量表示の波動関数との関係を理解する問題'

      - id: "02_040"
        title: "演算子の行列要素"
        difficulty: "標準"
        setup: '任意の演算子 $\hat{A}$ について行列要素 $\langle m|\hat{A}|n\rangle$ を計算し，期待値・固有値問題・基底変換との関係を整理する問題'

      - id: "02_050"
        title: "シュレーディンガー描像"
        difficulty: "基本"
        setup: 'シュレーディンガー描像では状態ベクトルが時間発展し，演算子は明示的な時間依存を除いて固定されることを理解し，時間発展演算子を用いて状態の時間発展を記述する問題'

      - id: "02_060"
        title: "ハイゼンベルク描像"
        difficulty: "標準"
        setup: 'ハイゼンベルク描像では状態ベクトルではなく演算子が時間発展することを理解し，ハイゼンベルク方程式 $dA_H/dt=(i/\hbar)[H,A_H]+\partial A_H/\partial t$ を導出する問題'

      - id: "02_070"
        title: "シュレーディンガー描像とハイゼンベルク描像の等価性"
        difficulty: "標準"
        setup: 'シュレーディンガー描像とハイゼンベルク描像で期待値が同じになることを示し，状態と演算子のどちらに時間依存性を持たせるかの違いを理解する問題'

      - id: "02_080"
        title: "相互作用描像"
        difficulty: "発展"
        setup: 'ハミルトニアンを自由部分と相互作用部分に分けたとき，相互作用描像を導入し，時間依存摂動論や場の量子論で有用となる理由を理解する問題'

  # ==========================================
  # 第3章：1次元束縛状態
  # ==========================================
  - theme: "井戸型ポテンシャルと束縛状態"
    problems:
      - id: "03_010"
        title: "無限深井戸型ポテンシャル"
        difficulty: "基本"
        setup: '一次元無限深井戸型ポテンシャル中の粒子について，時間独立シュレーディンガー方程式を解き，エネルギー固有値と規格化された固有関数を求める問題'

      - id: "03_020"
        title: "有限深井戸型ポテンシャル"
        difficulty: "標準"
        setup: '一次元有限深井戸型ポテンシャルに束縛された粒子について，井戸内外の波動関数を接続条件で結び，束縛状態のエネルギー条件を導出する問題'

      - id: "03_030"
        title: "パリティと固有状態の分類"
        difficulty: "標準"
        setup: '左右対称なポテンシャルにおいてハミルトニアンがパリティ演算子と可換であることを用い，固有関数を偶関数と奇関数に分類して解く問題'

      - id: "03_040"
        title: "デルタ関数ポテンシャルの束縛状態"
        difficulty: "標準"
        setup: '引力的なデルタ関数ポテンシャル $V(x)=-\alpha\delta(x)$ に束縛された粒子について，波動関数の連続性と微分の跳び条件から束縛エネルギーを求める問題'

      - id: "03_050"
        title: "二重井戸ポテンシャルと準位分裂"
        difficulty: "発展"
        setup: '二つの井戸が弱く結合した二重井戸ポテンシャルを考え，対称状態と反対称状態の形成およびトンネル効果によるエネルギー準位の分裂を解析する問題'

      - id: "03_060"
        title: "半無限井戸と境界条件"
        difficulty: "標準"
        setup: '一方が無限壁，他方が有限なポテンシャル障壁である半無限井戸型ポテンシャルについて，境界条件を用いて束縛状態のエネルギー固有値条件を求める問題'

      - id: "03_070"
        title: "束縛状態の節定理"
        difficulty: "発展"
        setup: '一次元束縛状態において，エネルギー固有値の順序と波動関数の節の数が対応することを具体例を通して理解する問題'

  # ==========================================
  # 第4章：ポテンシャル障壁とトンネル効果
  # ==========================================
  - theme: "散乱的1次元問題とトンネル効果"
    problems:
      - id: "04_010"
        title: "ポテンシャルステップでの反射と透過"
        difficulty: "基本"
        setup: '一次元ポテンシャルステップに入射する粒子について，各領域の波動関数を接続し，反射係数と透過係数を確率流密度から求める問題'

      - id: "04_020"
        title: "有限ポテンシャル障壁とトンネル効果"
        difficulty: "標準"
        setup: 'エネルギーが障壁の高さより低い粒子が有限幅ポテンシャル障壁に入射する場合について，波動関数の接続条件から透過確率を求め，トンネル効果を理解する問題'

      - id: "04_030"
        title: "共鳴透過"
        difficulty: "発展"
        setup: '有限幅ポテンシャル井戸または二重障壁構造に入射する粒子について，特定のエネルギーで透過確率が大きくなる共鳴透過の条件を解析する問題'

      - id: "04_040"
        title: "確率流密度と透過係数"
        difficulty: "標準"
        setup: '入射波・反射波・透過波の確率流密度を計算し，反射係数と透過係数の和が保存則により1になることを確認する問題'

      - id: "04_050"
        title: "WKB近似によるトンネル確率"
        difficulty: "発展"
        setup: 'ゆっくり変化するポテンシャル障壁に対してWKB近似を用い，古典的に禁制された領域を通過するトンネル確率を指数関数的に評価する問題'

      - id: "04_060"
        title: "アルファ崩壊のトンネル模型"
        difficulty: "発展"
        setup: '原子核からのアルファ粒子放出をクーロン障壁を通るトンネル効果としてモデル化し，崩壊確率が障壁透過率に強く依存することを理解する問題'

  # ==========================================
  # 第5章：量子調和振動子
  # ==========================================
  - theme: "量子調和振動子"
    problems:
      - id: "05_010"
        title: "調和振動子の無次元化"
        difficulty: "基本"
        setup: '一次元調和振動子ポテンシャル $V(x)=m\omega^2x^2/2$ に対して時間独立シュレーディンガー方程式を書き下し、無次元変数を導入することで方程式を標準形に変形する問題'

      - id: "05_020"
        title: "調和振動子の基底状態"
        difficulty: "基本"
        setup: '一次元調和振動子の基底状態をガウス型波動関数として仮定し、時間独立シュレーディンガー方程式に代入することで基底状態の波動関数と零点エネルギーを求める問題'

      - id: "05_030"
        title: "エルミート多項式と固有関数"
        difficulty: "標準"
        setup: '一次元量子調和振動子の励起状態について、波動関数がガウス因子とエルミート多項式の積で表されることを用い、低い量子数の固有関数とエネルギー固有値を求める問題'

      - id: "05_040"
        title: "期待値と不確定性"
        difficulty: "標準"
        setup: '量子調和振動子の基底状態および励起状態について、位置と運動量の期待値・二乗平均・不確定性を計算し、基底状態が最小不確定性状態であることを確認する問題'

      - id: "05_050"
        title: "生成消滅演算子の導入"
        difficulty: "標準"
        setup: '量子調和振動子に対して生成演算子と消滅演算子を導入し、交換関係を用いてハミルトニアンを数演算子で表し、エネルギー固有値 $E_n=\hbar\omega(n+1/2)$ を代数的に導出する問題'

      - id: "05_060"
        title: "数状態と演算子の作用"
        difficulty: "標準"
        setup: '数状態 $|n\rangle$ に対する生成演算子・消滅演算子・数演算子の作用を整理し、固有状態間の遷移や規格化係数を代数的に求める問題'

      - id: "05_070"
        title: "位置演算子と運動量演算子の行列要素"
        difficulty: "標準"
        setup: '生成消滅演算子を用いて位置演算子 $x$ と運動量演算子 $p$ を表し、数状態間の行列要素 $\langle m|x|n\rangle$ および $\langle m|p|n\rangle$ を計算する問題'

      - id: "05_080"
        title: "半調和振動子"
        difficulty: "発展"
        setup: '一方に無限に高い壁をもつ半調和振動子ポテンシャルを考え、通常の調和振動子の固有関数のパリティを利用して、許されるエネルギー準位と波動関数を求める問題'

      - id: "05_090"
        title: "コヒーレント状態"
        difficulty: "発展"
        setup: '消滅演算子の固有状態としてコヒーレント状態を定義し、数状態展開・期待値の時間発展・古典的振動との対応を求める問題'

      - id: "05_100"
        title: "スクイーズド状態"
        difficulty: "発展"
        setup: '位置と運動量の不確定性の一方を小さくし他方を大きくするスクイーズド状態を導入し、不確定性関係と位相空間での表現を理解する問題'

  # ==========================================
  # 第6章：角運動量
  # ==========================================
  - theme: "軌道角運動量と角運動量代数"
    problems:
      - id: "06_010"
        title: "角運動量演算子の交換関係"
        difficulty: "基本"
        setup: '軌道角運動量演算子 $\mathbf{L}=\mathbf{r}\times\mathbf{p}$ を定義し，成分間の交換関係 $[L_i,L_j]=i\hbar\epsilon_{ijk}L_k$ を導出する問題'

      - id: "06_020"
        title: "昇降演算子と角運動量固有値"
        difficulty: "標準"
        setup: '角運動量の昇降演算子 $L_\pm$ を用いて，$L^2$ と $L_z$ の同時固有状態に対する量子数 $l,m$ の許される値を導出する問題'

      - id: "06_030"
        title: "球面調和関数"
        difficulty: "標準"
        setup: '軌道角運動量の固有関数として球面調和関数 $Y_l^m(\theta,\phi)$ を導入し，規格化・直交性・低次の具体例を扱う問題'

      - id: "06_040"
        title: "角運動量の行列表現"
        difficulty: "標準"
        setup: '与えられた角運動量量子数 $l$ に対して，$L_x,L_y,L_z$ の行列表現を構成し，交換関係や固有値を確認する問題'

      - id: "06_050"
        title: "角運動量の合成"
        difficulty: "発展"
        setup: '二つの角運動量 $\mathbf{J}_1$ と $\mathbf{J}_2$ を合成し，全角運動量の固有状態をクレブシュ・ゴルダン係数を用いて表す問題'

      - id: "06_060"
        title: "選択則と角運動量"
        difficulty: "発展"
        setup: '角運動量保存則と演算子の変換性を用いて，遷移行列要素がゼロでないための選択則を導出する問題'

  # ==========================================
  # 第7章：スピン
  # ==========================================
  - theme: "スピンと二準位系"
    problems:
      - id: "07_010"
        title: "スピン1/2の行列表現"
        difficulty: "基本"
        setup: 'スピン $1/2$ 系に対してパウリ行列を用いたスピン演算子を導入し，$S_z$ の固有状態や交換関係を確認する問題'

      - id: "07_020"
        title: "任意方向のスピン測定"
        difficulty: "標準"
        setup: 'スピン $1/2$ 粒子について，任意方向 $\mathbf{n}$ に沿ったスピン演算子 $\mathbf{S}\cdot\mathbf{n}$ の固有値と固有状態を求め，測定確率を計算する問題'

      - id: "07_030"
        title: "磁場中のスピンの時間発展"
        difficulty: "標準"
        setup: '一様磁場中のスピン $1/2$ 粒子についてハミルトニアンを立て，ラーモア歳差運動としてスピン期待値が時間発展することを示す問題'

      - id: "07_040"
        title: "シュテルン・ゲルラッハ実験"
        difficulty: "基本"
        setup: '不均一磁場中を通過するスピン $1/2$ 粒子の軌道がスピン成分に応じて分裂することを理解し，スピン測定の量子力学的意味を説明する問題'

      - id: "07_050"
        title: "二準位系のラビ振動"
        difficulty: "発展"
        setup: '外部から時間依存摂動を受ける二準位系について，共鳴条件のもとで状態間の遷移確率が振動するラビ振動を解析する問題'

      - id: "07_060"
        title: "密度行列とブロッホ球"
        difficulty: "発展"
        setup: 'スピン $1/2$ 系の密度行列をブロッホベクトルで表し，純粋状態・混合状態・測定による状態の変化を幾何学的に理解する問題'

  # ==========================================
  # 第8章：中心力場と水素原子
  # ==========================================
  - theme: "中心力ポテンシャルと水素原子"
    problems:
      - id: "08_010"
        title: "中心力場での変数分離"
        difficulty: "基本"
        setup: '球対称ポテンシャル中の粒子についてシュレーディンガー方程式を球座標で変数分離し，角度部分が球面調和関数で表されることを理解する問題'

      - id: "08_020"
        title: "動径方程式と有効ポテンシャル"
        difficulty: "標準"
        setup: '中心力ポテンシャル中の動径方程式を導出し，角運動量に由来する遠心力項を含む有効ポテンシャルとして束縛状態を解析する問題'

      - id: "08_030"
        title: "水素原子のエネルギー準位"
        difficulty: "標準"
        setup: 'クーロンポテンシャル中の電子の束縛状態を解き，水素原子のエネルギー準位が主量子数 $n$ のみに依存することを導出する問題'

      - id: "08_040"
        title: "水素原子の波動関数"
        difficulty: "標準"
        setup: '水素原子の波動関数を動径関数と球面調和関数の積として表し，量子数 $n,l,m$ の意味と軌道の空間分布を理解する問題'

      - id: "08_050"
        title: "縮退と対称性"
        difficulty: "発展"
        setup: '水素原子のエネルギー準位に現れる縮退について，回転対称性およびクーロンポテンシャル特有の対称性との関係を考察する問題'

      - id: "08_060"
        title: "スピン軌道相互作用"
        difficulty: "発展"
        setup: '水素様原子におけるスピン軌道相互作用を摂動として扱い，全角運動量によるエネルギー準位の分裂を解析する問題'

      - id: "08_070"
        title: "ゼーマン効果"
        difficulty: "発展"
        setup: '外部磁場中の水素様原子について，軌道角運動量やスピンと磁場の相互作用によりエネルギー準位が分裂するゼーマン効果を解析する問題'

  # ==========================================
  # 第9章：電磁場中の荷電粒子
  # ==========================================
  - theme: "電磁場中の荷電粒子とゲージ対称性"
    problems:
      - id: "09_010"
        title: "最小結合とシュレーディンガー方程式"
        difficulty: "標準"
        setup: '電磁場中の荷電粒子に対して，運動量演算子を $\hat{\mathbf{p}}-q\mathbf{A}$ に置き換える最小結合を導入し，スカラー・ベクトルポテンシャルを含むシュレーディンガー方程式を導出する問題'

      - id: "09_020"
        title: "ゲージ変換と波動関数の位相"
        difficulty: "標準"
        setup: '電磁ポテンシャルのゲージ変換 $\mathbf{A}\to\mathbf{A}+\nabla\chi$, $\phi\to\phi-\partial\chi/\partial t$ に対して，波動関数の位相変換を考えることで物理量が不変であることを示す問題'

      - id: "09_030"
        title: "一様磁場中の荷電粒子"
        difficulty: "標準"
        setup: '一様磁場中を運動する荷電粒子について，適切なゲージを選んでハミルトニアンを構成し，古典的な円運動との対応を理解する問題'

      - id: "09_040"
        title: "ランダウ準位"
        difficulty: "発展"
        setup: '一様磁場中の二次元荷電粒子について，ランダウゲージまたは対称ゲージを用いてエネルギー準位を求め，ランダウ準位の縮退を解析する問題'

      - id: "09_050"
        title: "アハラノフ・ボーム効果"
        difficulty: "発展"
        setup: '磁場が粒子の通る領域ではゼロであっても，ベクトルポテンシャルにより波動関数の位相が変化し干渉縞がずれるアハラノフ・ボーム効果を解析する問題'

      - id: "09_060"
        title: "正常ゼーマン効果"
        difficulty: "標準"
        setup: '外部磁場中の原子において，軌道角運動量と磁場の相互作用によりエネルギー準位が分裂する正常ゼーマン効果を，摂動論を用いて導出する問題'

      - id: "09_070"
        title: "異常ゼーマン効果とスピン"
        difficulty: "発展"
        setup: '電子スピンを含めた磁気モーメントと外部磁場の相互作用を考え，スピン軌道相互作用や全角運動量を用いて異常ゼーマン効果の準位分裂を解析する問題'

      - id: "09_080"
        title: "荷電粒子の保存電流"
        difficulty: "発展"
        setup: '電磁場中のシュレーディンガー方程式から確率保存を表す連続の式を導き，ベクトルポテンシャルを含む確率流密度の形を求める問題'

  # ==========================================
  # 第10章：近似法
  # ==========================================
  - theme: "摂動論・変分法・WKB近似"
    problems:
      - id: "10_010"
        title: "時間に依存しない摂動論"
        difficulty: "基本"
        setup: 'ハミルトニアンが解ける部分と小さな摂動に分けられる場合について，非縮退摂動論によりエネルギー固有値と固有状態の一次補正を求める問題'

      - id: "10_020"
        title: "調和振動子への非調和摂動"
        difficulty: "標準"
        setup: '量子調和振動子に $x^4$ 型の弱い非調和項が加わった場合について，一次摂動論によりエネルギー準位の補正を求める問題'

      - id: "10_030"
        title: "縮退摂動論"
        difficulty: "標準"
        setup: '縮退した固有状態をもつ系に摂動が加わる場合について，縮退部分空間内で摂動ハミルトニアンを対角化してエネルギー分裂を求める問題'

      - id: "10_040"
        title: "変分法"
        difficulty: "標準"
        setup: '試行波動関数を用いてハミルトニアンの期待値を最小化し，基底状態エネルギーの上限を評価する変分法を具体的なポテンシャルに適用する問題'

      - id: "10_050"
        title: "ヘリウム原子の変分近似"
        difficulty: "発展"
        setup: 'ヘリウム原子の基底状態に対して有効核電荷を含む試行波動関数を用い，電子間反発を考慮した変分計算によりエネルギーを近似する問題'

      - id: "10_060"
        title: "WKB近似の量子化条件"
        difficulty: "発展"
        setup: '一次元束縛状態に対してWKB近似を用い，古典的に許された領域での位相積分からボーア・ゾンマーフェルト型の量子化条件を導出する問題'

      - id: "10_070"
        title: "時間依存摂動論"
        difficulty: "発展"
        setup: '時間依存する弱い摂動を受ける量子系について，遷移確率の一次近似を導出し，フェルミの黄金律へつながる考え方を理解する問題'

  # ==========================================
  # 第11章：散乱理論
  # ==========================================
  - theme: "量子散乱と断面積"
    problems:
      - id: "11_010"
        title: "散乱振幅と微分断面積"
        difficulty: "基本"
        setup: '三次元散乱問題において，入射平面波と外向き球面波からなる漸近形を用いて散乱振幅を定義し，微分断面積との関係を理解する問題'

      - id: "11_020"
        title: "ボルン近似"
        difficulty: "標準"
        setup: '弱いポテンシャルによる散乱について一次ボルン近似を用い，散乱振幅がポテンシャルのフーリエ変換で与えられることを導出する問題'

      - id: "11_030"
        title: "中心力ポテンシャルによる部分波展開"
        difficulty: "標準"
        setup: '球対称ポテンシャルによる散乱を部分波展開で扱い，位相シフトと散乱振幅および全断面積の関係を導出する問題'

      - id: "11_040"
        title: "低エネルギーs波散乱"
        difficulty: "標準"
        setup: '低エネルギー散乱において $s$ 波が支配的になることを用い，散乱長を導入して全断面積を近似的に求める問題'

      - id: "11_050"
        title: "光学定理"
        difficulty: "発展"
        setup: '散乱振幅の前方成分の虚部と全断面積を結びつける光学定理を，確率保存またはS行列のユニタリ性の観点から理解する問題'

      - id: "11_060"
        title: "クーロン散乱"
        difficulty: "発展"
        setup: 'クーロンポテンシャルによる荷電粒子の散乱について，量子力学的な散乱振幅や古典的なラザフォード散乱公式との対応を考察する問題'

  # ==========================================
  # 第12章：同種粒子と多体系
  # ==========================================
  - theme: "同種粒子・交換対称性・多体系入門"
    problems:
      - id: "12_010"
        title: "同種粒子の不可区別性"
        difficulty: "基本"
        setup: '同種粒子を交換しても物理状態が変わらないことを考え，波動関数が対称または反対称でなければならないことを理解する問題'

      - id: "12_020"
        title: "ボソンとフェルミオン"
        difficulty: "基本"
        setup: 'ボソンとフェルミオンの違いを波動関数の対称性から説明し，二粒子状態の構成方法を具体例で確認する問題'

      - id: "12_030"
        title: "パウリの排他原理"
        difficulty: "標準"
        setup: 'フェルミオンの反対称波動関数から，二つの同種フェルミオンが同じ一粒子状態を占有できないことを導く問題'

      - id: "12_040"
        title: "スレーター行列式"
        difficulty: "標準"
        setup: '複数のフェルミオンからなる反対称多粒子波動関数をスレーター行列式で構成し，粒子交換に対する符号変化を確認する問題'

      - id: "12_050"
        title: "二電子原子のスピン状態"
        difficulty: "発展"
        setup: '二つの電子をもつ系において，空間波動関数とスピン波動関数を組み合わせて全体が反対称になる条件を求め，一重項状態と三重項状態を分類する問題'

      - id: "12_060"
        title: "交換相互作用"
        difficulty: "発展"
        setup: '同種粒子の波動関数の対称性に由来する交換相互作用を考え，スピン状態によってエネルギーの有効的な差が生じることを理解する問題'

  # ==========================================
  # 第13章：量子測定・密度行列・量子情報
  # ==========================================
  - theme: "量子測定・密度行列・量子情報の基礎"
    problems:
      - id: "13_010"
        title: "射影測定"
        difficulty: "基本"
        setup: '観測量の固有状態への射影として量子測定を記述し，測定確率と測定後の状態がどのように決まるかを具体例で計算する問題'

      - id: "13_020"
        title: "純粋状態と混合状態"
        difficulty: "基本"
        setup: '状態ベクトルで表される純粋状態と，確率的混合として表される混合状態の違いを密度行列を用いて表し，期待値の計算方法を理解する問題'

      - id: "13_030"
        title: "部分トレースと縮約密度行列"
        difficulty: "標準"
        setup: '二つの部分系からなる合成量子系について，一方の自由度を部分トレースで消去し，部分系の縮約密度行列を求める問題'

      - id: "13_040"
        title: "ベル状態ともつれ"
        difficulty: "標準"
        setup: '二つのスピン $1/2$ 系からなるベル状態を用いて，積状態では表せない量子もつれ状態の特徴を理解し，部分系が混合状態として見えることを確認する問題'

      - id: "13_050"
        title: "エンタングルメントエントロピー"
        difficulty: "発展"
        setup: '二部系の純粋状態に対して縮約密度行列を求め，そのフォン・ノイマンエントロピーを計算することで量子もつれの大きさを評価する問題'

      - id: "13_060"
        title: "デコヒーレンス"
        difficulty: "発展"
        setup: '量子系が環境と相互作用することで，密度行列の非対角成分が減衰し，干渉性が失われるデコヒーレンスの基本的な仕組みを理解する問題'

  # ==========================================
  # 第14章：経路積分
  # ==========================================
  - theme: "経路積分と量子力学の別形式"
    problems:
      - id: "14_010"
        title: "伝播核と時間発展"
        difficulty: "標準"
        setup: '量子状態の時間発展を伝播核 $K(x_f,t_f;x_i,t_i)$ によって表し，初期波動関数から時刻 $t_f$ の波動関数を積分によって求める形式を理解する問題'

      - id: "14_020"
        title: "経路積分の導入"
        difficulty: "標準"
        setup: '時間発展演算子を短時間ごとに分割し，中間位置について完全性関係を挿入することで，すべての経路についての和として量子力学を表す経路積分表示を導入する問題'

      - id: "14_030"
        title: "作用と古典極限"
        difficulty: "標準"
        setup: '経路積分において各経路が位相因子 $\exp(iS/\hbar)$ で重み付けされることを用い，$\hbar\to0$ の古典極限で停留作用の経路が支配的になることを理解する問題'

      - id: "14_040"
        title: "自由粒子の伝播核"
        difficulty: "発展"
        setup: '一次元自由粒子について経路積分または時間発展演算子を用いて伝播核を計算し，波束の時間発展や拡がりとの関係を解析する問題'

      - id: "14_050"
        title: "調和振動子の経路積分"
        difficulty: "発展"
        setup: '調和振動子の作用が二次形式であることを利用し，古典経路の周りの揺らぎを考えることで伝播核を求める問題'

      - id: "14_060"
        title: "虚時間と統計力学"
        difficulty: "発展"
        setup: '時間を虚時間 $\tau=it$ に解析接続すると，量子力学の時間発展と統計力学のボルツマン因子が対応することを理解し，分配関数を経路積分として表す問題'

      - id: "14_070"
        title: "経路積分とトンネル効果"
        difficulty: "発展"
        setup: '古典的に禁制された領域を通るトンネル効果について，虚時間経路やインスタントン的な考え方を用いて指数因子を評価する問題'

  # ==========================================
  # 第15章：電磁場の量子化
  # ==========================================
  - theme: "電磁場の量子化と光子"
    problems:
      - id: "15_010"
        title: "古典電磁場のモード展開"
        difficulty: "標準"
        setup: '真空中の自由電磁場を平面波モードに展開し，各モードが独立な調和振動子のように振る舞うことをマクスウェル方程式から理解する問題'

      - id: "15_020"
        title: "クーロンゲージと横波条件"
        difficulty: "標準"
        setup: '電磁場の量子化においてクーロンゲージ $\nabla\cdot\mathbf{A}=0$ を選び，自由電磁場の物理的自由度が横波成分に対応することを理解する問題'

      - id: "15_030"
        title: "電磁場の正準量子化"
        difficulty: "発展"
        setup: '電磁場の各モードを量子調和振動子として扱い，生成消滅演算子を導入することで電磁場のハミルトニアンを光子数演算子で表す問題'

      - id: "15_040"
        title: "光子数状態"
        difficulty: "標準"
        setup: '電磁場の一つのモードに対して光子数状態 $|n\rangle$ を導入し，エネルギーが $\hbar\omega(n+1/2)$ で与えられることや生成消滅演算子の作用を理解する問題'

      - id: "15_050"
        title: "電磁場のコヒーレント状態"
        difficulty: "発展"
        setup: '光のコヒーレント状態を消滅演算子の固有状態として定義し，レーザー光のような古典的電磁波との対応や光子数分布の性質を解析する問題'

      - id: "15_060"
        title: "真空揺らぎ"
        difficulty: "発展"
        setup: '電磁場の基底状態においても零点エネルギーや場の揺らぎが存在することを，量子調和振動子との対応から理解する問題'

      - id: "15_070"
        title: "光と物質の相互作用"
        difficulty: "発展"
        setup: '荷電粒子と量子化された電磁場の相互作用を最小結合から導入し，吸収・放出過程や遷移確率の基本的な考え方を理解する問題'

      - id: "15_080"
        title: "自然放出と誘導放出"
        difficulty: "発展"
        setup: '二準位原子と量子化電磁場の相互作用を考え，自然放出・誘導放出・吸収が光子数や遷移確率とどのように関係するかを理解する問題'

  # ==========================================
  # 第16章：相対論的量子力学と場の量子論への入口
  # ==========================================
  - theme: "相対論的量子力学と場の量子論への入口"
    problems:
      - id: "16_010"
        title: "クライン・ゴルドン方程式"
        difficulty: "発展"
        setup: '相対論的エネルギー運動量関係 $E^2=p^2c^2+m^2c^4$ からクライン・ゴルドン方程式を導出し，非相対論的シュレーディンガー方程式との違いを理解する問題'

      - id: "16_020"
        title: "ディラック方程式の考え方"
        difficulty: "発展"
        setup: 'エネルギーと運動量について一次の相対論的波動方程式を求めるという動機からディラック方程式を導入し，スピンや反粒子の出現を概念的に理解する問題'

      - id: "16_030"
        title: "第二量子化の導入"
        difficulty: "発展"
        setup: '多粒子状態を生成消滅演算子によって記述する第二量子化の考え方を導入し，ボソン・フェルミオンの交換関係または反交換関係を理解する問題'

      - id: "16_040"
        title: "場の量子化と粒子数表示"
        difficulty: "発展"
        setup: '場を無限個の調和振動子として展開し，各モードの励起数が粒子数として解釈されることを理解する問題'

      - id: "16_050"
        title: "時間発展演算子と相互作用描像"
        difficulty: "発展"
        setup: 'シュレーディンガー描像・ハイゼンベルク描像・相互作用描像の違いを整理し，時間依存摂動論で相互作用描像が有用になる理由を理解する問題'