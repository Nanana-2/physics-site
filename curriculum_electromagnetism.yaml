electromagnetism:

  # ==========================================
  # 第1章：静電場
  # ==========================================
  - theme: "クーロンの法則とガウスの法則"
    problems:
      - id: "01_010"
        title: "点電荷が作る電場と電位"
        difficulty: "基本"
        setup: '点電荷 $q$ が空間に作る電場と電位をクーロンの法則から導出し、複数の点電荷が存在する場合には重ね合わせの原理を用いて合成電場および合成電位を求める問題'

      - id: "01_020"
        title: "連続電荷分布が作る電場"
        difficulty: "基本"
        setup: '線電荷・面電荷・体積電荷分布が与えられたとき、微小電荷要素が作る電場を積分することで、対称性のある連続電荷分布が作る電場を求める問題'

      - id: "01_030"
        title: "ガウスの法則の基本的な適用"
        difficulty: "基本"
        setup: '球対称・円筒対称・平面対称な電荷分布に対して適切なガウス面を選び、ガウスの法則を用いて電場を求める問題'

      - id: "01_040"
        title: "一様帯電球の電場と電位"
        difficulty: "標準"
        setup: '半径 $R$ の球内に一様な体積電荷密度 $\rho$ で電荷が分布している場合について、球の内部と外部の電場をガウスの法則から求め、さらに電位の連続性を用いて電位分布を導出する問題'

      - id: "01_050"
        title: "無限長線電荷と無限平面電荷"
        difficulty: "標準"
        setup: '無限長の一様線電荷および無限に広い一様面電荷が作る電場について、対称性から電場の向きと大きさの依存性を判断し、ガウスの法則を用いて電場を求める問題'

      - id: "01_060"
        title: "ポアソン方程式とラプラス方程式"
        difficulty: "発展"
        setup: '静電ポテンシャル $\phi$ と電場 $\mathbf{E}=-\nabla\phi$ の関係から、ポアソン方程式 $\nabla^2\phi=-\rho/\varepsilon_0$ を導出し、電荷のない領域ではラプラス方程式が成り立つことを示す問題'

      - id: "01_070"
        title: "静電場の境界条件"
        difficulty: "発展"
        setup: '電荷分布や媒質が境界面を持つ系について、電位の連続性および電場の法線成分の不連続条件を用いて、領域ごとの電場や電位を決定する問題'

  # ==========================================
  # 第2章：導体とコンデンサー
  # ==========================================
  - theme: "導体・静電遮蔽・コンデンサー"
    problems:
      - id: "02_010"
        title: "静電平衡にある導体"
        difficulty: "基本"
        setup: '静電平衡にある導体において、導体内部の電場がゼロになること、余剰電荷が表面にのみ分布すること、導体表面の電場が表面に垂直になることを説明する問題'

      - id: "02_020"
        title: "導体球の電場と電位"
        difficulty: "基本"
        setup: '孤立した半径 $R$ の導体球に電荷 $Q$ を与えた場合について、導体内部と外部の電場および電位を求め、導体が等電位になることを確認する問題'

      - id: "02_030"
        title: "平行板コンデンサーの静電容量"
        difficulty: "基本"
        setup: '面積 $S$、板間距離 $d$ の平行板コンデンサーについて、端効果を無視して電場・電位差・静電容量を求める問題'

      - id: "02_040"
        title: "コンデンサーに蓄えられる静電エネルギー"
        difficulty: "標準"
        setup: 'コンデンサーを充電する過程で外力がする仕事を考え、静電エネルギー $U=Q^2/(2C)=CV^2/2$ を導出し、電場のエネルギー密度 $\varepsilon_0 E^2/2$ との対応を示す問題'

      - id: "02_050"
        title: "導体球殻と静電遮蔽"
        difficulty: "標準"
        setup: '中空の導体球殻の内側または外側に電荷を置いた場合について、誘導電荷の分布と電場の様子を求め、静電遮蔽の性質を理解する問題'

      - id: "02_060"
        title: "鏡像法による点電荷と接地導体平面"
        difficulty: "発展"
        setup: '無限に広い接地導体平面の近くに点電荷 $q$ を置いた場合について、鏡像電荷を導入して電位・電場・導体平面に誘導される電荷分布・点電荷に働く力を求める問題'

      - id: "02_070"
        title: "同心球コンデンサーと同軸円筒コンデンサー"
        difficulty: "発展"
        setup: '同心球殻または同軸円筒導体からなるコンデンサーについて、ガウスの法則により電場を求め、電位差と静電容量を導出する問題'

  # ==========================================
  # 第3章：誘電体
  # ==========================================
  - theme: "誘電体と分極"
    problems:
      - id: "03_010"
        title: "誘電体中のクーロン力と電場"
        difficulty: "基本"
        setup: '誘電率 $\varepsilon$ をもつ一様な誘電体中に点電荷や電荷分布が存在する場合について、真空中との違いを意識しながら電場・電位を求める問題'

      - id: "03_020"
        title: "分極ベクトルと束縛電荷"
        difficulty: "標準"
        setup: '誘電体の分極ベクトル $\mathbf{P}$ を導入し、束縛体積電荷密度 $\rho_b=-\nabla\cdot\mathbf{P}$ および束縛表面電荷密度 $\sigma_b=\mathbf{P}\cdot\mathbf{n}$ を用いて分極が作る電場を解析する問題'

      - id: "03_030"
        title: "電束密度と誘電体中のガウスの法則"
        difficulty: "標準"
        setup: '電束密度 $\mathbf{D}=\varepsilon_0\mathbf{E}+\mathbf{P}$ を導入し、自由電荷に対するガウスの法則 $\nabla\cdot\mathbf{D}=\rho_f$ を用いて誘電体中の電場を求める問題'

      - id: "03_040"
        title: "誘電体を挿入したコンデンサー"
        difficulty: "標準"
        setup: '平行板コンデンサーの板間に誘電体を全体または部分的に挿入した場合について、電場・電位差・静電容量・蓄えられる静電エネルギーがどのように変化するかを求める問題'

      - id: "03_050"
        title: "誘電体境界面での境界条件"
        difficulty: "発展"
        setup: '異なる誘電率をもつ二つの媒質の境界面において、電場の接線成分と電束密度の法線成分に関する境界条件を導出し、電気力線の屈折を解析する問題'

      - id: "03_060"
        title: "一様分極した球が作る電場"
        difficulty: "発展"
        setup: '一様に分極した誘電体球について、束縛表面電荷分布を求め、球の内部および外部に生じる電場を電気双極子場との関係も含めて解析する問題'

      - id: "03_070"
        title: "誘電体に働く力"
        difficulty: "発展"
        setup: '電場中に置かれた誘電体に働く力について、静電エネルギーの変化を用いる方法や電場による応力の考え方を用いて導出する問題'

  # ==========================================
  # 第4章：定常電流と静磁場
  # ==========================================
  - theme: "定常電流と静磁場"
    problems:
      - id: "04_010"
        title: "電流密度と連続の式"
        difficulty: "基本"
        setup: '電荷密度 $\rho$ と電流密度 $\mathbf{j}$ の関係を考え、微小体積における電荷保存則から連続の式 $\partial\rho/\partial t+\nabla\cdot\mathbf{j}=0$ を導出する問題'

      - id: "04_020"
        title: "局所的なオームの法則とジュール熱"
        difficulty: "基本"
        setup: '導体内部の電場 $\mathbf{E}$ と電流密度 $\mathbf{j}$ の関係 $\mathbf{j}=\sigma\mathbf{E}$ を用いて電流分布を求め、単位体積あたりのジュール熱の発生率を導出する問題'

      - id: "04_030"
        title: "ビオ・サバールの法則"
        difficulty: "基本"
        setup: '定常電流が作る磁場をビオ・サバールの法則から求め、無限直線電流や円形電流が作る磁場の代表的な計算を行う問題'

      - id: "04_040"
        title: "アンペールの法則の適用"
        difficulty: "標準"
        setup: '対称性の高い定常電流分布に対してアンペールの法則を適用し、無限直線電流・ソレノイド・トロイドが作る磁場を求める問題'

      - id: "04_050"
        title: "電流ループと磁気双極子モーメント"
        difficulty: "標準"
        setup: '小さな電流ループが遠方に作る磁場を近似的に求め、磁気双極子モーメントを導入し、外部磁場中で受けるトルクやエネルギーを導出する問題'

      - id: "04_060"
        title: "ローレンツ力と荷電粒子の運動"
        difficulty: "標準"
        setup: '一様な電場および磁場中を運動する荷電粒子について、ローレンツ力による運動方程式を立て、円運動・らせん運動・電場と磁場によるドリフト運動を解析する問題'

      - id: "04_070"
        title: "ベクトルポテンシャルとゲージ変換"
        difficulty: "発展"
        setup: '磁場をベクトルポテンシャル $\mathbf{B}=\nabla\times\mathbf{A}$ によって表し、ゲージ変換の自由度やクーロンゲージの意味を理解し、簡単な電流分布に対するベクトルポテンシャルを求める問題'

  # ==========================================
  # 第5章：磁性体
  # ==========================================
  - theme: "磁化と磁性体"
    problems:
      - id: "05_010"
        title: "磁化ベクトルと磁化電流"
        difficulty: "標準"
        setup: '磁性体の磁化ベクトル $\mathbf{M}$ を導入し、束縛体積電流密度 $\mathbf{j}_b=\nabla\times\mathbf{M}$ および束縛表面電流密度 $\mathbf{K}_b=\mathbf{M}\times\mathbf{n}$ を導出する問題'

      - id: "05_020"
        title: "磁場 $\mathbf{H}$ と自由電流"
        difficulty: "標準"
        setup: '磁場 $\mathbf{H}$ を $\mathbf{B}=\mu_0(\mathbf{H}+\mathbf{M})$ によって導入し、自由電流に対するアンペールの法則 $\nabla\times\mathbf{H}=\mathbf{j}_f$ を用いて磁性体中の磁場を求める問題'

      - id: "05_030"
        title: "線形磁性体中の磁場"
        difficulty: "標準"
        setup: '線形等方磁性体における構成関係 $\mathbf{B}=\mu\mathbf{H}$ を用いて、ソレノイドやトロイド内部に磁性体を挿入した場合の磁場や磁束密度を求める問題'

      - id: "05_040"
        title: "磁性体境界面での境界条件"
        difficulty: "発展"
        setup: '異なる透磁率をもつ媒質の境界面について、磁束密度の法線成分と磁場の接線成分に関する境界条件を導出し、磁場の屈折や境界面近傍の場を解析する問題'

      - id: "05_050"
        title: "一様磁化した円柱と球"
        difficulty: "発展"
        setup: '一様に磁化した円柱または球について、磁化電流または磁極の考え方を用いて、内部および外部に生じる磁場を求める問題'

      - id: "05_060"
        title: "磁気エネルギーとインダクタンス"
        difficulty: "発展"
        setup: 'コイルやソレノイドに蓄えられる磁気エネルギーを磁場のエネルギー密度から求め、自己インダクタンスおよび相互インダクタンスとの関係を導出する問題'

  # ==========================================
  # 第6章：電磁誘導
  # ==========================================
  - theme: "ファラデーの法則と電磁誘導"
    problems:
      - id: "06_010"
        title: "ファラデーの電磁誘導の法則"
        difficulty: "基本"
        setup: '閉回路を貫く磁束が時間変化するときに誘導起電力が生じることをファラデーの法則で表し、レンツの法則を用いて誘導電流の向きを判断する問題'

      - id: "06_020"
        title: "運動する導体棒の誘導起電力"
        difficulty: "基本"
        setup: '一様磁場中を速度 $v$ で動く導体棒に生じる誘導起電力を、磁束変化の考え方とローレンツ力の考え方の両方から求める問題'

      - id: "06_030"
        title: "時間変化する磁場が作る誘導電場"
        difficulty: "標準"
        setup: '時間変化する一様磁場により空間に渦状の誘導電場が生じる状況を考え、マクスウェル・ファラデー方程式を用いて誘導電場の大きさと向きを求める問題'

      - id: "06_040"
        title: "自己誘導とRL回路"
        difficulty: "標準"
        setup: '自己インダクタンス $L$ をもつコイルと抵抗 $R$ からなるRL回路について、スイッチ投入後または遮断後の電流の時間変化を微分方程式から求める問題'

      - id: "06_050"
        title: "相互誘導と変圧器"
        difficulty: "標準"
        setup: '二つのコイルの間に相互インダクタンス $M$ が存在する場合について、一方の電流変化が他方に誘導起電力を生じさせる過程を解析し、理想変圧器の関係式を導出する問題'

      - id: "06_060"
        title: "渦電流とエネルギー散逸"
        difficulty: "発展"
        setup: '時間変化する磁場中に置かれた導体内に生じる渦電流を考え、誘導電場・電流分布・ジュール熱によるエネルギー散逸を解析する問題'

      - id: "06_070"
        title: "交流回路と複素インピーダンス"
        difficulty: "発展"
        setup: '抵抗・コイル・コンデンサーを含む交流回路について、複素インピーダンスを用いて電流と電圧の振幅および位相差を求め、共振条件を解析する問題'

  # ==========================================
  # 第7章：マクスウェル方程式と電磁波
  # ==========================================
  - theme: "マクスウェル方程式と電磁波"
    problems:
      - id: "07_010"
        title: "変位電流とアンペール・マクスウェルの法則"
        difficulty: "標準"
        setup: 'コンデンサー充電時の電流と磁場に関する矛盾を考察し、変位電流の導入によってアンペールの法則がどのように修正されるかを理解する問題'

      - id: "07_020"
        title: "真空中のマクスウェル方程式"
        difficulty: "基本"
        setup: '電荷と電流が存在しない真空中におけるマクスウェル方程式を書き下し、それぞれの方程式が表す物理的意味を説明する問題'

      - id: "07_030"
        title: "電磁波の波動方程式"
        difficulty: "標準"
        setup: '真空中のマクスウェル方程式から電場と磁場が満たす波動方程式を導出し、電磁波の伝播速度が $c=1/\sqrt{\varepsilon_0\mu_0}$ で与えられることを示す問題'

      - id: "07_040"
        title: "平面電磁波の性質"
        difficulty: "標準"
        setup: '真空中を伝播する平面電磁波について、電場・磁場・波数ベクトルが互いに直交すること、および電場と磁場の振幅比をマクスウェル方程式から導出する問題'

      - id: "07_050"
        title: "ポインティングベクトルとエネルギー流"
        difficulty: "標準"
        setup: '電磁場のエネルギー密度とポインティングベクトルを導入し、電磁波が運ぶエネルギー流束や時間平均強度を求める問題'

      - id: "07_060"
        title: "媒質中の電磁波"
        difficulty: "発展"
        setup: '誘電率 $\varepsilon$ と透磁率 $\mu$ をもつ一様媒質中を伝わる電磁波について、波の速度・屈折率・電場と磁場の関係を導出する問題'

      - id: "07_070"
        title: "導体中の電磁波と表皮効果"
        difficulty: "発展"
        setup: '有限の電気伝導率をもつ導体中を伝わる電磁波について、複素波数を導入して電磁波の減衰を解析し、表皮深さを求める問題'

  # ==========================================
  # 第8章：境界値問題と発展的話題
  # ==========================================
  - theme: "境界値問題と発展的話題"
    problems:
      - id: "08_010"
        title: "ラプラス方程式の変数分離"
        difficulty: "標準"
        setup: '直交座標系または球座標系においてラプラス方程式を変数分離し、与えられた境界条件を満たす静電ポテンシャルを求める問題'

      - id: "08_020"
        title: "接地導体球と点電荷の鏡像法"
        difficulty: "発展"
        setup: '接地された導体球の外部に点電荷を置いた場合について、鏡像電荷を用いて電位・誘導電荷分布・点電荷に働く力を求める問題'

      - id: "08_030"
        title: "多重極展開"
        difficulty: "発展"
        setup: '局在した電荷分布が遠方に作る電位を多重極展開し、単極子・双極子・四重極子の寄与を区別して解析する問題'

      - id: "08_040"
        title: "電気双極子の電場とポテンシャル"
        difficulty: "標準"
        setup: '大きさが等しく符号が反対の二つの点電荷からなる電気双極子について、遠方近似を用いて電位と電場を求める問題'

      - id: "08_050"
        title: "電磁場の運動量とマクスウェル応力"
        difficulty: "発展"
        setup: '電磁場がエネルギーだけでなく運動量を持つことを、ポインティングベクトルやマクスウェル応力テンソルの考え方を用いて説明し、簡単な系に働く力を求める問題'

      - id: "08_060"
        title: "遅延ポテンシャル"
        difficulty: "発展"
        setup: '時間変化する電荷分布および電流分布が作る電磁場について、相互作用が有限速度で伝わることを反映した遅延ポテンシャルの考え方を理解する問題'