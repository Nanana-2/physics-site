{% extends "base.html" %}

{% block header %}
  {{ super() }}
  
  {% if page.is_homepage %}
    <div class="md-hero">
      <div class="md-hero__inner md-grid">
        <h1>大学物理の演習問題アーカイブ</h1>
        <p>院試における重要トピックを問題形式で網羅しよう</p>
        <a href="tags/" class="md-button md-button--primary">問題一覧を覗いてみる</a>
      </div>
    </div>

    <style>
      .md-hero {
        position: relative;
        /* ✨ 解決1：サイトの青に100%馴染む、洗練されたディープブルーのグラデーション */
        background: linear-gradient(180deg, var(--md-primary-fg-color) 0%, #1e3a8a 100%);
        color: #ffffff;
        padding: 4rem 1.5rem 6rem; /* ⬇️下の波のスペースのために、下部の余白を広く */
        text-align: center;
        overflow: hidden;
      }

      /* ✨ 解決2：AI感を破壊する「なだらかな曲線の波（SVG）」を配置 */
      .md-hero::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 40px; /* 波の高さ */
        background-color: var(--md-background-color, #ffffff); /* サイトのメイン背景白と自動で合流 */
        /* 美しい曲線を1行のコードで表現（SVGマスク） */
        clip-path: ellipse(60% 100% at 50% 100%);
      }

      .md-hero__inner {
        position: relative;
        z-index: 1;
        max-width: 40rem;
        margin: 0 auto;
      }

      .md-hero h1 {
        color: #ffffff;
        font-weight: 800;
        font-size: clamp(1.8rem, 4.5vw, 2.4rem); /* 威圧感を無くすため、ほんの少しマイルドなサイズに */
        line-height: 1.3;
        letter-spacing: -0.01em;
        margin-bottom: 0.8rem;
        word-break: keep-all;
        overflow-wrap: break-word;
      }

      .md-hero p {
        font-size: clamp(0.95rem, 2.8vw, 1.05rem);
        line-height: 1.6;
        margin-bottom: 2.2rem;
        opacity: 0.85; /* 文字の白を少しだけ柔らかく */
        font-weight: 400;
        letter-spacing: 0.02em;
      }

      /* ✨ 絶賛していただいたボタン：ピンク寄りの赤をより洗練 */
      .md-hero .md-button--primary {
        background-color: #ec407a; 
        color: #ffffff;
        border: none;
        font-weight: 700;
        font-size: clamp(0.85rem, 2.5vw, 0.95rem);
        padding: 0.8rem 2.2rem;
        border-radius: 50px;
        box-shadow: 0 4px 15px rgba(236, 64, 122, 0.4);
        transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s ease;
      }

      .md-hero .md-button--primary:hover {
        background-color: #f06292;
        transform: translateY(-3px) scale(1.02); /* ぷにっと浮き出るような気持ちいいエフェクト */
        box-shadow: 0 8px 25px rgba(236, 64, 122, 0.6);
      }

      @media screen and (min-width: 60em) {
        .md-hero {
          padding: 6rem 1.5rem 8rem; /* PCではさらにダイナミックに */
        }
        .md-hero::after {
          height: 60px; /* PCでは波を少し深く */
        }
      }
    </style>
  {% endif %}
{% endblock %}
