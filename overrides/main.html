{% extends "base.html" %}

{% block header %}
  {{ super() }}
  
  {% if page.is_homepage %}
<div class="md-hero">
  <div class="md-hero__inner">
    
    <div class="hero-text-block">
      <h1>
        <span>大学物理の</span>
        <span>演習問題アーカイブ</span>
      </h1>
      <p class="hero-description">力学から統計力学まで、学部物理の重要トピックを300問以上の演習でたどる。</p>

      <div class="hero-actions">
        <a href="{{ 'tags/' | url }}" class="md-button md-button--primary">難易度から探す</a>
        <a href="#fields" class="md-button hero-button-secondary">分野から選ぶ ↓</a>
      </div>

      <ul class="hero-stats" aria-label="収録内容">
        <li><strong>300+</strong><span>演習問題</span></li>
        <li><strong>5</strong><span>分野</span></li>
        <li><strong>3</strong><span>難易度</span></li>
      </ul>
    </div>

  </div>
</div>
    <style>
      /* ヒーローセクション全体 */
      .md-hero {
        background-color: var(--md-default-bg-color);
        padding: clamp(2.25rem, 5vw, 3.75rem) 1.5rem;
        border-bottom: 1px solid var(--md-default-fg-color--lightest);
      }

      /* title メタデータ由来の自動見出しはホームでは表示しない */
      .md-content__inner > h1:first-child {
        display: none;
      }

      html {
        scroll-behavior: smooth;
      }

      #fields {
        scroll-margin-top: 4rem;
      }

      /* 本文幅に合わせたメインコンテナ */
      .md-hero__inner {
        max-width: 64rem;
        margin: 0 auto;
      }

      /* ヒーローのテキスト */
      .hero-text-block {
        max-width: 44rem;
        text-align: left;
        padding-left: clamp(0.5rem, 2vw, 2rem);
      }

      /* タイトル */
      .md-hero h1 {
        display: flex;
        flex-wrap: wrap;
        gap: 0 0.35em;
        color: var(--md-typeset-color);
        font-weight: 500;
        font-size: clamp(1.55rem, 3vw, 2.25rem);
        line-height: 1.35;
        margin: 0 0 1rem;
        letter-spacing: -0.015em;
      }

      .md-hero h1 span {
        white-space: nowrap;
      }

      /* 説明文 */
      .md-hero .hero-description {
        max-width: 38rem;
        margin: 0;
        color: var(--md-default-fg-color--light);
        font-size: clamp(0.95rem, 2vw, 1.05rem);
        line-height: 1.8;
      }

      .hero-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-top: 1.6rem;
      }

      /* ボタン */
      .md-hero .hero-actions .md-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.65rem 1.4rem;
        border: 1px solid var(--md-default-fg-color--lighter);
        border-radius: 4px;
        box-shadow: none;
        font-size: 0.82rem;
        font-weight: 600;
      }

      .md-hero .hero-actions .md-button--primary {
        background-color: var(--md-primary-fg-color);
        color: #ffffff;
        border-color: var(--md-primary-fg-color);
      }

      .md-hero .hero-actions .md-button--primary:hover {
        opacity: 0.88;
      }

      .md-hero .hero-actions .hero-button-secondary {
        background-color: transparent;
        color: var(--md-default-fg-color);
        border-color: var(--md-default-fg-color--lighter);
      }

      .md-hero .hero-actions .hero-button-secondary:hover {
        color: var(--md-primary-fg-color);
        border-color: var(--md-primary-fg-color);
      }

      /* 収録内容 */
      .hero-stats {
        display: flex;
        flex-wrap: wrap;
        gap: 0.8rem 1.8rem;
        margin: 1.5rem 0 0;
        padding: 0;
        list-style: none;
      }

      .hero-stats li {
        display: flex;
        align-items: baseline;
        gap: 0.45rem;
        margin: 0;
      }

      .hero-stats strong {
        color: var(--md-typeset-color);
        font-size: 1rem;
        font-weight: 600;
      }

      .hero-stats span {
        color: var(--md-default-fg-color--light);
        font-size: 0.78rem;
      }

      /* スマホ用のレスポンシブ対応 */
      @media screen and (max-width: 45em) {
        .md-hero {
          padding: 2.5rem 1rem;
        }
        .hero-text-block {
          padding-left: 0;
        }
        .md-hero h1 {
          font-size: clamp(1.5rem, 7vw, 2rem);
        }
        .hero-stats {
          gap: 1rem 1.5rem;
        }
      }

      @media screen and (max-width: 30em) {
        .hero-actions {
          display: grid;
        }
        .hero-actions .md-button {
          width: 100%;
          text-align: center;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        html {
          scroll-behavior: auto;
        }
      }
    </style>
  {% endif %}
{% endblock %}
