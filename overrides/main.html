{% extends "base.html" %}

{% block header %}
  {{ super() }}
  
  {% if page.is_homepage %}
<div class="md-hero">
  <div class="md-hero__inner">
    
    <div class="hero-text-block">
      <p class="hero-kicker">大学物理・院試演習</p>
      <h1>
        <span>大学物理の</span>
        <span>演習問題アーカイブ</span>
      </h1>
      <p class="hero-description">力学から統計力学まで、学部物理の重要トピックを300問以上の演習でたどる。</p>

      <div class="hero-actions">
        <a href="{{ 'tags/' | url }}" class="md-button md-button--primary">難易度から探す</a>
        <a href="#fields" class="md-button hero-button-secondary">分野から選ぶ</a>
      </div>

      <ul class="hero-stats" aria-label="収録内容">
        <li><strong>300+</strong><span>演習問題</span></li>
        <li><strong>5</strong><span>分野</span></li>
        <li><strong>3</strong><span>難易度</span></li>
      </ul>
    </div>

  </div>
</div>
    <style>
      /* ヒーローセクション全体 */
      .md-hero {
        background-color: var(--md-default-bg-color);
        padding: clamp(3rem, 7vw, 5.5rem) 1.5rem;
        border-bottom: 1px solid var(--md-default-fg-color--lightest);
      }

      /* 本文幅に合わせたメインコンテナ */
      .md-hero__inner {
        max-width: 64rem;
        margin: 0 auto;
      }

      /* ヒーローのテキスト */
      .hero-text-block {
        max-width: 48rem;
        text-align: left;
        padding-left: clamp(0.5rem, 2vw, 2rem);
      }

      .md-hero .hero-kicker {
        margin: 0 0 0.8rem;
        color: #d83b72;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.08em;
      }

      /* タイトル */
      .md-hero h1 {
        color: var(--md-typeset-color);
        font-weight: 500;
        font-size: clamp(2rem, 4.5vw, 3.2rem);
        line-height: 1.25;
        margin: 0 0 1.2rem;
        letter-spacing: -0.025em;
      }

      .md-hero h1 span {
        display: block;
      }

      /* 説明文 */
      .md-hero .hero-description {
        max-width: 38rem;
        margin: 0;
        color: var(--md-default-fg-color--light);
        font-size: clamp(0.95rem, 2vw, 1.05rem);
        line-height: 1.8;
      }

      .hero-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-top: 2rem;
      }

      /* ボタン */
      .md-hero .md-button--primary {
        background-color: #d83b72;
        color: #ffffff;
        border: none;
        font-weight: 600;
        font-size: 0.9rem;
        padding: 0.75rem 2rem;
        border-radius: 3px;
        box-shadow: none;
        transition: background-color 0.2s ease;
      }

      .md-hero .md-button--primary:hover {
        background-color: #bd2f62;
      }

      .md-hero .hero-button-secondary {
        color: var(--md-default-fg-color);
        border-color: var(--md-default-fg-color--lighter);
        border-radius: 3px;
      }

      .md-hero .hero-button-secondary:hover {
        color: #d83b72;
        border-color: #d83b72;
      }

      /* 収録内容 */
      .hero-stats {
        display: flex;
        flex-wrap: wrap;
        gap: 1.5rem 2.5rem;
        margin: 2.5rem 0 0;
        padding: 1.4rem 0 0;
        border-top: 1px solid var(--md-default-fg-color--lightest);
        list-style: none;
      }

      .hero-stats li {
        display: flex;
        align-items: baseline;
        gap: 0.45rem;
        margin: 0;
      }

      .hero-stats strong {
        color: var(--md-typeset-color);
        font-size: 1.25rem;
        font-weight: 600;
      }

      .hero-stats span {
        color: var(--md-default-fg-color--light);
        font-size: 0.78rem;
      }

      /* スマホ用のレスポンシブ対応 */
      @media screen and (max-width: 45em) {
        .md-hero {
          padding: 2.5rem 1rem;
        }
        .hero-text-block {
          padding-left: 0;
        }
        .md-hero h1 {
          font-size: clamp(1.8rem, 9vw, 2.5rem);
        }
        .hero-stats {
          gap: 1rem 1.5rem;
        }
      }

      @media screen and (max-width: 30em) {
        .hero-actions {
          display: grid;
        }
        .hero-actions .md-button {
          width: 100%;
          text-align: center;
        }
      }
    </style>
  {% endif %}
{% endblock %}
