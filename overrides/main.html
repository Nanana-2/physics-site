{% extends "base.html" %}

{% block header %}
  {{ super() }}
  
  {% if page.is_homepage %}
<div class="md-hero">
  <div class="md-hero__inner">
    
    <div class="hero-text-block">
      <h1>大学物理の演習問題アーカイブ</h1>
      <p>院試における重要トピックを問題形式で網羅しよう</p>
      <a href="tags/" class="md-button md-button--primary">問題をみる</a>
    </div>

    <div class="hero-image-block">
      <img src="{{ 'assets/images/desktop-computer.png' | url }}" alt="Desktop PC Illustration">
    </div>

  </div>
</div>
    <style>
      /* ヒーローセクション全体の背景（白） */
      .md-hero {
        background-color: #ffffff;
        padding: 3rem 1.5rem;
        border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      }

      /* 左右2分割を制御するメインコンテナ */
      .md-hero__inner {
        max-width: 64rem;
        margin: 0 auto;
        /* テーブルレイアウトで左右に並べる（WeasyPrint/MkDocs互換） */
        display: table;
        width: 100%;
      }

      /* 左ブロック（テキスト） */
      .hero-text-block {
        display: table-cell;
        vertical-align: middle;
        width: 50%;
        text-align: left;
        padding-left: 2rem;
        padding-right: 3rem;
      }

      /* 右ブロック（画像） */
      .hero-image-block {
        display: table-cell;
        vertical-align: middle;
        width: 50%;
        text-align: center;
      }

      /* 画像のサイズ調整 */
      .hero-image-block img {
        max-width: 100%;
        height: auto;
        max-height: 320px; /* 画像が大きくなりすぎないようにセーブ */
      }

      /* タイトルの文字デザイン（黒〜濃いグレー） */
      .md-hero h1 {
        color: #1e293b;
        font-weight: 500;
        font-size: clamp(1.5rem, 3vw, 2rem);
        line-height: 1.4;
        margin-bottom: 0.8rem;
        letter-spacing: -0.01em;
      }

      /* 説明文の文字デザイン */
      .md-hero p {
        color: #64748b;
        font-size: clamp(0.95rem, 2.5vw, 1.05rem);
        line-height: 1.6;
        margin-bottom: 2rem;
      }

      /* ✨ ご希望の四角いボタン（アクセントのピンク赤） */
      .md-hero .md-button--primary {
        background-color: #ec407a; 
        color: #ffffff;
        border: none;
        font-weight: 600;
        font-size: 0.9rem;
        padding: 0.75rem 2rem;
        border-radius: 6px; /* カプセルではなく、シュッとした四角い角丸 */
        box-shadow: 0 4px 12px rgba(236, 64, 122, 0.2);
        transition: all 0.2s ease;
      }

      .md-hero .md-button--primary:hover {
        background-color: #f06291c8;
        transform: translateY(-1px);
        box-shadow: 0 6px 15px rgba(236, 64, 122, 0.3);
      }

      /* 📱 解決：スマホ用のレスポンシブ対応（画面幅が狭いとき） */
      @media screen and (max-width: 45em) {
        .md-hero {
          padding: 2.5rem 1rem;
        }
        .md-hero__inner {
          display: block; /* テーブル表示を解除して縦並びに */
        }
        .hero-text-block, .hero-image-block {
          display: block;
          width: 100%;
          text-align: center; /* スマホでは中央揃えが綺麗 */
          padding-left: 0;
          padding-right: 0;
        }
        .hero-image-block {
          margin-top: 2.5rem; /* 文字と画像の間に少しスキマを空ける */
        }
        .hero-image-block img {
          max-height: 260px; /* スマホでは画像を少し小ぶりに */
        }
      }
    </style>
  {% endif %}
{% endblock %}
