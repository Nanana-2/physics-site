{% extends "base.html" %}

{% block header %}
  {{ super() }}
  
  {% if page.is_homepage %}
<div class="md-hero">
  <div class="md-hero__inner">
    
    <div class="hero-text-block">
      <h1>
        物理の問題をたくさん見よう！
      </h1>
      <p class="hero-description">力学から統計力学まで学部物理の重要問題をまとめました</p>

      <div class="hero-actions">
        <a href="#fields" class="md-button hero-button-primary">分野ごとにみる ↓</a>
        <a href="{{ 'tags/' | url }}" class="md-button hero-button-secondary">難易度ごとの一覧へ</a>
      </div>
    </div>

  </div>
</div>
    <style>
      /* ヒーローセクション全体 */
      .md-hero {
        background-color: var(--md-code-bg-color);
        padding: clamp(1.8rem, 4vw, 3rem) 1.5rem;
        border-bottom: 1px solid var(--md-default-fg-color--lightest);
      }

      /* title メタデータ由来の自動見出しはホームでは表示しない */
      .md-content__inner > h1:first-child {
        display: none;
      }

      .md-content__inner > h1:first-child + h2 {
        margin-top: 0;
      }

      html {
        scroll-behavior: smooth;
      }

      #fields {
        scroll-margin-top: 4rem;
      }

      /* 本文幅に合わせたメインコンテナ */
      .md-hero__inner {
        max-width: 64rem;
        margin: 0 auto;
      }

      /* ヒーローのテキスト */
      .hero-text-block {
        max-width: 44rem;
        text-align: left;
        padding-left: clamp(0.5rem, 2vw, 2rem);
      }

      /* タイトル */
      .md-hero h1 {
        color: var(--md-typeset-color);
        font-weight: 400;
        font-size: 1.25rem;
        line-height: 1.4;
        margin: 0 0 0.65rem;
        letter-spacing: 0;
      }

      /* 説明文 */
      .md-hero .hero-description {
        max-width: 38rem;
        margin: 0;
        color: var(--md-default-fg-color);
        font-size: 0.8rem;
        font-weight: 400;
        line-height: 1.6;
      }

      .hero-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-top: 1.35rem;
      }

      /* ボタン */
      .md-hero .hero-actions .md-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.65rem 1.4rem;
        border: 1px solid var(--md-default-fg-color--lighter);
        border-radius: 4px;
        box-shadow: none;
        font-size: 0.8rem;
        font-weight: 600;
      }

      .md-hero .hero-actions .hero-button-primary {
        background-color: var(--md-primary-fg-color);
        color: #ffffff;
        border-color: var(--md-primary-fg-color);
      }

      .md-hero .hero-actions .hero-button-primary:hover {
        background-color: var(--md-primary-fg-color--dark);
        border-color: var(--md-primary-fg-color--dark);
      }

      .md-hero .hero-actions .hero-button-secondary {
        background-color: transparent;
        color: var(--md-primary-fg-color);
        border-color: var(--md-primary-fg-color--light);
      }

      .md-hero .hero-actions .hero-button-secondary:hover {
        color: var(--md-primary-fg-color--dark);
        border-color: var(--md-primary-fg-color--dark);
      }

      /* スマホ用のレスポンシブ対応 */
      @media screen and (max-width: 45em) {
        .md-hero {
          padding: 2rem 1rem;
        }
        .hero-text-block {
          padding-left: 0;
        }
      }

      @media screen and (max-width: 30em) {
        .hero-actions {
          display: grid;
        }
        .hero-actions .md-button {
          width: 100%;
          text-align: center;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        html {
          scroll-behavior: auto;
        }
      }
    </style>
  {% endif %}
{% endblock %}
