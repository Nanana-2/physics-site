{% extends "base.html" %}

{% block header %}
  {{ super() }}
  
  {% if page.is_homepage %}
<div class="md-hero">
  <div class="md-hero__inner">
    
    <div class="hero-text-block">
      <h1>大学物理の演習問題アーカイブ</h1>
      <p>院試における重要トピックを問題形式で網羅しよう！</p>
      <a href="tags/" class="md-button md-button--primary">問題をみる</a>
    </div>

    <div class="hero-image-block">
      <img src="{{ 'assets/images/desktop-computer.png' | url }}" alt="Desktop PC Illustration">
    </div>

  </div>
</div>
    <style>
      /* ヒーローセクション全体 */
      .md-hero {
        /* 💡 改善1：ヘッダーの青から白へ、ほんのり滑らかに繋がる超微細なグラデーション */
        background: linear-gradient(180deg, rgba(0, 0, 0, 0.02) 0%, #ffffff 100%);
        background-color: #ffffff;
        padding: 4rem 2rem; /* 上下の余白を少しだけ広げてゆったりさせる */
        border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      }

      /* 左右2分割を制御するコンテナ */
      .md-hero__inner {
        max-width: 64rem;
        margin: 0 auto;
        display: table;
        width: 100%;
      }

      /* 左ブロック（テキスト） */
      .hero-text-block {
        display: table-cell;
        vertical-align: middle;
        width: 52%; /* 💡 文字エリアをわずかに広げて改行の余裕を持たせる */
        text-align: left;
        padding-right: 3rem; /* 画像とのスキマをしっかり取る */
      }

      /* 右ブロック（画像） */
      .hero-image-block {
        display: table-cell;
        vertical-align: middle;
        width: 48%;
        text-align: center;
      }

      .hero-image-block img {
        max-width: 100%;
        height: auto;
        max-height: 300px;
      }

      /* 💡 改善2：タイトルの文字の詰まり具合と改行の制御 */
      .md-hero h1 {
        color: #1e293b;
        font-weight: 800; /* より力強く引き締まった太さに */
        font-size: clamp(1.8rem, 3.8vw, 2.3rem); /* デカすぎず小さすぎない絶妙なサイズ */
        line-height: 1.35;
        letter-spacing: -0.03em; /* 👈 文字の間隔をわずかに詰めて「ロゴ」のような締まりを出す */
        margin-bottom: 1rem;
        
        /* ⬇️ これが超重要！「アーカイブ」が途中で絶対に千切れないようにする魔法 */
        display: inline-block;
        word-break: keep-all; 
        overflow-wrap: break-word;
      }

      /* 説明文 */
      .md-hero p {
        color: #475569; /* ほんの少しだけ濃くして読みやすく */
        font-size: clamp(0.95rem, 2.2vw, 1.05rem);
        line-height: 1.65;
        margin-bottom: 2.2rem;
        letter-spacing: 0.02em;
      }

      /* 四角いボタン */
      .md-hero .md-button--primary {
        background-color: #4043ec67; 
        color: #ffffff;
        border: none;
        font-weight: 700;
        font-size: 0.9rem;
        padding: 0.75rem 2.2rem;
        border-radius: 6px; 
        box-shadow: 0 4px 14px rgba(236, 64, 122, 0.25);
        transition: all 0.2s ease;
        letter-spacing: 0.05em;
      }

      .md-hero .md-button--primary:hover {
        background-color: #6962f03e;
        transform: translateY(-1px);
        box-shadow: 0 6px 18px rgba(236, 64, 122, 0.35);
      }

      /* スマホ用のレスポンシブ対応 */
      @media screen and (max-width: 45em) {
        .md-hero {
          padding: 3rem 1.5rem;
        }
        .md-hero__inner {
          display: block;
        }
        .hero-text-block, .hero-image-block {
          display: block;
          width: 100%;
          text-align: center;
          padding-right: 0;
        }
        .hero-image-block {
          margin-top: 3rem;
        }
        .hero-image-block img {
          max-height: 240px;
        }
      }
    </style>
  {% endif %}
{% endblock %}
