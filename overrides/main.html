{% extends "base.html" %}

{% block header %}
  {{ super() }}
  
  {% if page.is_homepage %}
    <div class="md-hero">
      <div class="md-hero__inner md-grid">
        <h1>大学物理の演習問題アーカイブ</h1>
        <p>院試における重要トピックを問題形式で網羅しよう</p>
        <a href="tags/" class="md-button md-button--primary">問題一覧を覗いてみる</a>
      </div>
    </div>

    <style>
      .md-hero {
        position: relative;
        /* 深みのあるグラデーション背景 */
        background: linear-gradient(135deg, #1e293b, #0f172a); /* 落ち着いたダークネイビー系（テーマに合わせて調整可） */
        color: #ffffff;
        padding: 3.5rem 1rem; /* スマホ用のコンパクトな余白 */
        text-align: center;
        overflow: hidden;
      }

      /* ✨ 物足りなさを消す：数式・理系サイトに完璧にマッチするグリッド背景 */
      .md-hero::before {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background-image: 
          linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
        background-size: 20px 20px; /* 方眼紙のようなグリッド */
        mask-image: radial-gradient(ellipse at center, black, transparent 80%);
        -webkit-mask-image: radial-gradient(ellipse at center, black, transparent 80%);
        pointer-events: none;
      }

      .md-hero__inner {
        position: relative;
        z-index: 1;
        max-width: 42rem;
        margin: 0 auto;
      }

      /* 📱 スマホで文字が切れないための「可変文字サイズ（clamp）」 */
      .md-hero h1 {
        color: #ffffff;
        font-weight: 800;
        /* 画面幅に応じて 1.8rem(スマホ) 〜 2.8rem(PC) まで滑らかに自動調節 */
        font-size: clamp(1.8rem, 5vw, 2.8rem); 
        line-height: 1.3;
        letter-spacing: -0.01em;
        margin-bottom: 1rem;
        word-break: keep-all; /* 単語の途中での不自然な改行を防ぐ */
        overflow-wrap: break-word;
      }

      .md-hero p {
        /* 画面幅に応じて 0.95rem(スマホ) 〜 1.15rem(PC) に自動調節 */
        font-size: clamp(0.95rem, 3vw, 1.15rem);
        line-height: 1.6;
        margin-bottom: 2rem;
        opacity: 0.8;
        font-weight: 300;
        letter-spacing: 0.02em;
      }

      .md-hero .md-button--primary {
        background-color: #ffffff;
        color: #0f172a; /* 背景の濃い色に合わせる */
        border: none;
        font-weight: 600;
        font-size: clamp(0.85rem, 2.5vw, 0.95rem);
        padding: 0.7rem 2rem;
        border-radius: 50px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .md-hero .md-button--primary:hover {
        background-color: #ffffffb6;
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
      }

      /* 🖥️ PC（画面が広い時）だけ、さらに高級感を出すために余白を広げる */
      @media screen and (min-width: 60em) {
        .md-hero {
          padding: 5.5rem 1.5rem; /* PCではドカンと広く */
        }
      }
    </style>
  {% endif %}
{% endblock %}
