{% extends "base.html" %}

{% block header %}
  {{ super() }}
  
  {% if page.is_homepage %}
<div class="md-hero">
  <div class="md-hero__inner">
    
    <div class="hero-text-block">
      <h1>
        物理の問題がたくさん！
      </h1>
      <p class="hero-description">力学から統計力学まで学部物理の重要問題をまとめました</p>

      <div class="hero-actions">
        <a href="#fields" class="md-button hero-button-primary">分野ごとにみる ↓</a>
        <a href="{{ 'tags/' | url }}" class="md-button hero-button-secondary">難易度ごとの一覧へ</a>
      </div>
    </div>

  </div>
</div>
    <style>
      /* ヒーローセクション全体 */
      .md-hero {
        background-color: var(--md-default-bg-color);
        padding: clamp(1.8rem, 4vw, 3rem) 1.5rem;
        border-bottom: 1px solid var(--md-default-fg-color--lightest);
      }

      /* title メタデータ由来の自動見出しはホームでは表示しない */
      .md-content__inner > h1:first-child {
        display: none;
      }

      .md-content__inner > h1:first-child + h2 {
        margin-top: 0;
      }

      html {
        scroll-behavior: smooth;
      }

      #fields {
        scroll-margin-top: 4rem;
      }

      /* 本文幅に合わせたメインコンテナ */
      .md-hero__inner {
        max-width: 64rem;
        margin: 0 auto;
      }

      /* ヒーローのテキスト */
      .hero-text-block {
        max-width: 44rem;
        text-align: left;
        padding-left: clamp(0.5rem, 2vw, 2rem);
      }

      /* タイトル */
      .md-hero h1 {
        display: flex;
        flex-wrap: wrap;
        gap: 0 0.35em;
        color: var(--md-typeset-color);
        font-weight: 500;
        font-size: clamp(1.55rem, 3vw, 2.25rem);
        line-height: 1.35;
        margin: 0 0 1rem;
        letter-spacing: -0.015em;
      }

      .md-hero h1 span {
        white-space: nowrap;
      }

      /* 説明文 */
      .md-hero .hero-description {
        max-width: 38rem;
        margin: 0;
        color: var(--md-default-fg-color--light);
        font-size: clamp(0.95rem, 2vw, 1.05rem);
        line-height: 1.8;
      }

      .hero-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-top: 1.35rem;
      }

      /* ボタン */
      .md-hero .hero-actions .md-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.65rem 1.4rem;
        border: 1px solid var(--md-default-fg-color--lighter);
        border-radius: 4px;
        box-shadow: none;
        font-size: 0.82rem;
        font-weight: 600;
      }

      .md-hero .hero-actions .hero-button-primary {
        background-color: var(--md-default-fg-color);
        color: var(--md-default-bg-color);
        border-color: var(--md-default-fg-color);
      }

      .md-hero .hero-actions .hero-button-primary:hover {
        opacity: 0.82;
      }

      .md-hero .hero-actions .hero-button-secondary {
        background-color: transparent;
        color: var(--md-default-fg-color);
        border-color: var(--md-default-fg-color--lighter);
      }

      .md-hero .hero-actions .hero-button-secondary:hover {
        color: var(--md-default-fg-color);
        border-color: var(--md-default-fg-color);
      }

      /* ホームの分野カード */
      .md-typeset .grid.cards.subject-grid > ul {
        gap: 0.9rem;
      }

      .md-typeset .grid.cards.subject-grid > ul > li {
        padding: 1.1rem 1.2rem;
        border: 1px solid var(--md-default-fg-color--lightest);
        border-radius: 6px;
        box-shadow: none;
        transition: border-color 0.18s ease, transform 0.18s ease;
      }

      .md-typeset .grid.cards.subject-grid > ul > li:hover {
        border-color: var(--md-default-fg-color--lighter);
        transform: translateY(-2px);
      }

      .md-typeset .grid.cards.subject-grid > ul > li > p:first-child {
        margin-top: 0;
        font-size: 1.02rem;
      }

      .md-typeset .grid.cards.subject-grid hr {
        margin: 0.7rem 0;
        border-color: var(--md-default-fg-color--lightest);
      }

      .md-typeset .grid.cards.subject-grid a::after {
        content: " →";
      }

      /* スマホ用のレスポンシブ対応 */
      @media screen and (max-width: 45em) {
        .md-hero {
          padding: 2rem 1rem;
        }
        .hero-text-block {
          padding-left: 0;
        }
        .md-hero h1 {
          font-size: clamp(1.5rem, 7vw, 2rem);
        }
      }

      @media screen and (max-width: 30em) {
        .hero-actions {
          display: grid;
        }
        .hero-actions .md-button {
          width: 100%;
          text-align: center;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        html {
          scroll-behavior: auto;
        }
        .md-typeset .grid.cards.subject-grid > ul > li {
          transition: none;
        }
      }
    </style>
  {% endif %}
{% endblock %}
