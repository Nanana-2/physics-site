{% extends "base.html" %}

{% block header %}
  {{ super() }}
  
  {% if page.is_homepage %}
<div class="md-hero">
  <div class="md-hero__inner">
    
    <div class="hero-text-block">
      <h1>
        <span>大学物理の</span>
        <span>演習問題アーカイブ</span>
      </h1>
      <p>院試で扱われる重要トピックを問題形式で網羅しよう</p>
      <a href="tags/" class="md-button md-button--primary">問題をみる</a>
    </div>

    <div class="hero-image-block">
      <img src="{{ 'assets/images/desktop-computer.png' | url }}" alt="Desktop PC Illustration">
    </div>

  </div>
</div>
    <style>
      /* ヒーローセクション全体 */
      .md-hero {
        background-color: var(--md-default-bg-color);
        padding: clamp(2.5rem, 6vw, 4.5rem) 1.5rem;
        border-bottom: 1px solid var(--md-default-fg-color--lightest);
      }

      /* 左右2分割を制御するメインコンテナ */
      .md-hero__inner {
        max-width: 64rem;
        margin: 0 auto;
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(15rem, 0.9fr);
        align-items: center;
        gap: clamp(2rem, 5vw, 4rem);
      }

      /* 左ブロック（テキスト） */
      .hero-text-block {
        text-align: left;
        padding-left: clamp(0.5rem, 2vw, 2rem);
      }

      /* 右ブロック（画像） */
      .hero-image-block {
        text-align: center;
      }

      /* 画像のサイズ調整 */
      .hero-image-block img {
        max-width: 100%;
        height: auto;
        max-height: 250px;
      }

      /* タイトルの文字デザイン（黒〜濃いグレー） */
      .md-hero h1 {
        color: var(--md-typeset-color);
        font-weight: 500;
        font-size: clamp(1.5rem, 2.7vw, 2rem);
        line-height: 1.35;
        margin-bottom: 0.8rem;
        letter-spacing: -0.01em;
      }

      .md-hero h1 span {
        display: block;
      }

      /* 説明文の文字デザイン */
      .md-hero p {
        color: var(--md-default-fg-color--light);
        font-size: clamp(0.95rem, 2.5vw, 1.05rem);
        line-height: 1.6;
        margin-bottom: 2rem;
      }

      /* 控えめなアクセントのボタン */
      .md-hero .md-button--primary {
        background-color: #d83b72;
        color: #ffffff;
        border: none;
        font-weight: 600;
        font-size: 0.9rem;
        padding: 0.75rem 2rem;
        border-radius: 3px;
        box-shadow: none;
        transition: background-color 0.2s ease;
      }

      .md-hero .md-button--primary:hover {
        background-color: #bd2f62;
      }

      /* スマホ用のレスポンシブ対応 */
      @media screen and (max-width: 45em) {
        .md-hero {
          padding: 2.5rem 1rem;
        }
        .md-hero__inner {
          grid-template-columns: 1fr;
          gap: 2rem;
        }
        .hero-text-block, .hero-image-block {
          text-align: center;
        }
        .hero-text-block {
          padding-left: 0;
        }
        .hero-image-block img {
          max-height: 220px;
        }
      }
    </style>
  {% endif %}
{% endblock %}
