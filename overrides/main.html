{% extends "base.html" %}

{% block header %}
  {{ super() }}
  
  {% if page.is_homepage %}
    <div class="md-hero">
      <div class="md-hero__inner md-grid">
        <h1>大学物理の演習アーカイブ</h1>
        <p>AIとともに構築する、問題集。力学から量子力学まで網羅。</p>
        <a href="mechanics/" class="md-button md-button--primary">問題を解いてみる</a>
      </div>
    </div>

    <style>
      .md-hero {
        background: linear-gradient(135deg, var(--md-primary-fg-color), var(--md-primary-fg-color--dark));
        color: var(--md-primary-bg-color);
        padding: 3.5rem 1rem;
        text-align: center;
      }
      .md-hero h1 {
        color: white;
        font-weight: 700;
        font-size: 2.5rem;
        margin: 0 0 0.5rem;
      }
      .md-hero p {
        font-size: 1.1rem;
        max-width: 35rem;
        margin: 0 auto 1.5rem;
        opacity: 0.9;
      }
      .md-hero .md-button--primary {
        background-color: white;
        color: var(--md-primary-fg-color);
        border-color: white;
        font-weight: bold;
        padding: 0.5rem 2rem;
      }
      .md-hero .md-button--primary:hover {
        background-color: rgba(255, 255, 255, 0.9);
        border-color: rgba(255, 255, 255, 0.9);
      }
    </style>
  {% endif %}
{% endblock %}
