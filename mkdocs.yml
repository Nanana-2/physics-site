site_name: 大学物理の問題集
theme:
  name: material
  font:
    text: Noto Sans JP  # 👈 サイト全体の文字を Noto Sans JP に！
    code: Roboto Mono   # 👈 数式やコード用のフォント（そのままでOK）
  features:
    - content.code.copy 
    - navigation.footer # コードをコピーするボタンを付ける（おまけ）
    # - navigation.expand # ★これを追加！初期状態でサイドバーの各章を折りたたみます


  palette:
    # 1つ目の設定：ライトモード
    - media: "(prefers-color-scheme: light)" # ユーザーの端末がライトモードの時
      scheme: default
      primary: teal        # サイトのメインカラー（お好みで変更可能）
      accent: teal         # リンクなどのアクセントカラー
      toggle:
        icon: material/weather-sunny # スイッチのアイコン（太陽）
        name: ダークモードに切り替え

    # 2つ目の設定：ダークモード
    - media: "(prefers-color-scheme: dark)"  # ユーザーの端末がダークモードの時
      scheme: slate        # ダークモード用の黒基調テーマ
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night # スイッチのアイコン（月）
        name: ライトモードに切り替え


markdown_extensions:
  - meta
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: math
          class: arithmatex
          format: !!python/name:pymdownx.arithmatex.fence_mathjax_format
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg


extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search
  - awesome-pages
  - tags:
      tags_file: tags.md                # ✨ コロン(:)を付けて、設定を下に書く
                  


extra_css:
  - stylesheets/extra.css