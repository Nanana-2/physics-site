site_name: 大学物理の問題集
theme:
  name: material
  font:
    text: Noto Sans JP  # 👈 サイト全体の文字を Noto Sans JP に！
    code: Roboto Mono   # 👈 数式やコード用のフォント（そのままでOK）
  features:
    - content.code.copy # コードをコピーするボタンを付ける（おまけ）
    # - navigation.expand # ★これを追加！初期状態でサイドバーの各章を折りたたみます

markdown_extensions:
  - meta
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: math
          class: arithmatex
          format: !!python/name:pymdownx.arithmatex.fence_mathjax_format
  - pymdownx.arithmatex:
      generic: true


extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search
  - awesome-pages
  - tags              # ★これを入れると、サイト上に綺麗なタグが自動表示されます


extra_css:
  - stylesheets/extra.css