site_name: 大学物理の問題集
theme:
  name: material
  font:
    text: Noto Sans JP  # 👈 サイト全体の文字を Noto Sans JP に！
    code: Roboto Mono   # 👈 数式やコード用のフォント（そのままでOK）
  features:
    - content.code.copy 
    - navigation.footer # コードをコピーするボタンを付ける（おまけ）
    # - navigation.expand # ★これを追加！初期状態でサイドバーの各章を折りたたみます

markdown_extensions:
  - meta
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: math
          class: arithmatex
          format: !!python/name:pymdownx.arithmatex.fence_mathjax_format
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg


extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search
  - awesome-pages
  - tags:                # ✨ コロン(:)を付けて、設定を下に書く
      tags_file: tags.md              # ★これを入れると、サイト上に綺麗なタグが自動表示されます


extra_css:
  - stylesheets/extra.css