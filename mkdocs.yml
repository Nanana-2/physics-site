site_name: 大学物理の問題集
theme:
  name: material
  features:
    - content.code.copy # コードをコピーするボタンを付ける（おまけ）

markdown_extensions:
  - meta              # ★これがないとFrontmatter（メタデータ）を認識しません
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search
  - awesome-pages
  - tags              # ★これを入れると、サイト上に綺麗なタグが自動表示されます